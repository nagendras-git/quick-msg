<script>
(function(){
  const iconHref = document.querySelector('link[rel=apple-touch-icon]')?.href || '';
  const manifest = JSON.stringify({
    name: 'QuickMsg', short_name: 'QuickMsg',
    description: 'Message without saving the number',
    start_url: './', display: 'standalone', orientation: 'portrait',
    background_color: '#0d0d10', theme_color: '#0d0d10',
    icons: [
      { src: iconHref, sizes: '180x180', type: 'image/png' },
      { src: iconHref, sizes: '512x512', type: 'image/png', purpose: 'any maskable' }
    ]
  });
  const mBlob = new Blob([manifest], { type: 'application/json' });
  const mLink = document.createElement('link');
  mLink.rel = 'manifest'; mLink.href = URL.createObjectURL(mBlob);
  document.head.appendChild(mLink);

  if ('serviceWorker' in navigator) {
    const swCode = `
      self.addEventListener('install', () => self.skipWaiting());
      self.addEventListener('activate', e => e.waitUntil(clients.claim()));
      self.addEventListener('fetch', e => e.respondWith(fetch(e.request).catch(() => caches.match(e.request))));
    `;
    const swBlob = new Blob([swCode], { type: 'application/javascript' });
    navigator.serviceWorker.register(URL.createObjectURL(swBlob), { scope: '/' }).catch(() => {});
  }
})();
</script>

<style>
/* ── Size scale ── */
[data-size="S"]  { font-size: 13px; }
[data-size="M"]  { font-size: 16px; }
[data-size="L"]  { font-size: 19px; }
[data-size="XL"] { font-size: 22px; }

/* ── Color tokens — index4 palette ── */
:root {
  --bg:       #0d0d10;
  --surface:  #141417;
  --surface2: #1e1e25;
  --surface3: #26262f;
  --border:   #4a4a60;
  --border2:  #383850;
  --scrim:    rgba(0,0,0,0.72);
  --text1:    #f4f4fa;
  --text2:    #c8c8e0;
  --text3:    #b0b0cc;
  --green:    #22c55e;
  --red:      #f87171;
  --blue:     #3B82F6;
  --wa:       #25D366;
  --wa-dk:    #128C4E;
  --tg:       #2AABEE;
  --tg-dk:    #0d7cbf;
  --accent:   #25D366;
  --mono:     'Inter', sans-serif;
  --r:        12px;
  --r-lg:     16px;
  --r-xl:     20px;
  --ease:     cubic-bezier(0.16,1,0.3,1);
  --spring:   cubic-bezier(0.34,1.56,0.64,1);
  --safe-b:   env(safe-area-inset-bottom, 0px);
  --safe-t:   env(safe-area-inset-top, 0px);
}
[data-theme="soft-dark"] {
  --bg:       #1a1a1f;
  --surface:  #222228;
  --surface2: #2a2a32;
  --surface3: #313139;
  --border:   #4c4c5c;
  --border2:  #3d3d4a;
  --text1:    #ececf1;
  --text2:    #b8b8c8;
  --text3:    #888898;
}
[data-theme="light"] {
  --bg:       #f2f2f7;
  --surface:  #ffffff;
  --surface2: #ffffff;
  --surface3: #f0f0f5;
  --border:   #c8c8d8;
  --border2:  #d8d8e4;
  --text1:    #1a1a25;
  --text2:    #606078;
  --text3:    #9898b0;
  --scrim:    rgba(0,0,0,0.45);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html {
  height: 100%;
  overflow-x: hidden;
  font-size: 16px; background: var(--bg); transition: font-size .2s;
}
body {
  font-family: 'Inter', -apple-system, sans-serif;
  background: var(--bg); color: var(--text1);
  min-height: 100%; min-height: 100dvh;
  max-width: 100vw;
  -webkit-font-smoothing: antialiased;
  overflow-x: hidden;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  transition: background .25s, color .25s;
}
::-webkit-scrollbar { width: 0; height: 0; }

/* ── Layout ── */
.app {
  width: 100%; max-width: 480px; margin: 0 auto;
  padding: 1.25rem 14px 3.5rem;
  display: flex; flex-direction: column; gap: 1.25rem;
}

/* ── Header (index4 sticky style) ── */
.top-header {
  position: sticky; top: 0; z-index: 80;
  background: rgba(13,13,16,0.96);
  backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border2);
  padding: calc(env(safe-area-inset-top, 12px) + 12px) 16px 11px;
  display: flex; align-items: center; justify-content: center;
  margin-left: -14px; margin-right: -14px; width: calc(100% + 28px);
}
[data-theme="light"] .top-header {
  background: var(--bg);
  border-bottom: 1px solid var(--border);
  box-shadow: none;
}
.hdr-inner {
  width: 100%; max-width: 480px;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 14px;
}
.hdr-left { display: flex; align-items: center; gap: 10px; }
.logo-icon {
  width: 2.2rem; height: 2.2rem; border-radius: 10px; flex-shrink: 0;
  background: linear-gradient(135deg, var(--wa), var(--tg));
  display: flex; align-items: center; justify-content: center;

const WA_PATH = `M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413Z`;

// ── Country code custom dropdown ──
function isoToFlag(iso) {
  return iso.toUpperCase().split('').map(c => String.fromCodePoint(0x1F1E6 - 65 + c.charCodeAt(0))).join('');
}

let ccValue = '+91';
let ccIso   = 'IN';
const ccLabel  = document.getElementById('ccLabel');
const ccList   = document.getElementById('ccList');
const ccDrop   = document.getElementById('ccDropdown');
const ccBack   = document.getElementById('ccBackdrop');
const ccSearch = document.getElementById('ccSearch');

// Stub so validation code that references ccSel.value still works
const ccSel = { get value() { return ccValue; } };

function setCCValue(iso, name, code) {
  ccValue = code; ccIso = iso;
  ccLabel.textContent = `${isoToFlag(iso)} ${code}`;
  ccList.querySelectorAll('.cc-option').forEach(el => {
    el.classList.toggle('selected', el.dataset.iso === iso);
  });
}

function renderCCList(filter) {
  const q = (filter || '').toLowerCase().trim();
  ccList.innerHTML = '';
  const filtered = q ? CC.filter(([iso, name, code]) =>
    iso.toLowerCase().includes(q) ||
    name.toLowerCase().includes(q) ||
    code.includes(q)
  ) : CC;
  if (!filtered.length) {
    ccList.innerHTML = '<div class="cc-no-results">No countries found</div>';
    return;
  }
  filtered.forEach(([iso, name, code]) => {
    const div = document.createElement('div');
    div.className = 'cc-option' + (iso === ccIso ? ' selected' : '');
    div.dataset.iso = iso;
    div.innerHTML = `
      <span class="cc-flag">${isoToFlag(iso)}</span>
      <div class="cc-option-info">
        <span class="cc-option-name">${name}</span>
        <span class="cc-option-iso">${iso}</span>
      </div>
      <span class="cc-option-code">${code}</span>
      <svg class="cc-check" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>`;
    div.addEventListener('click', () => {
      setCCValue(iso, name, code);
      closeCCDropdown();
      const digits = document.getElementById('phoneInput').value.replace(/\D/g, '');
      if (digits) {
        const err = getPhoneError(digits, ccValue);
        if (err) showPhoneErr(err); else clearPhoneErr();
      }
    });
    ccList.appendChild(div);
  });
}

function openCCDropdown() {
  renderCCList('');
  ccSearch.value = '';
  ccDrop.classList.add('open');
  ccBack.classList.add('open');
  setTimeout(() => {
    const sel = ccList.querySelector('.cc-option.selected');
    if (sel) sel.scrollIntoView({ block: 'center' });
  }, 50);
}
function closeCCDropdown() {
  ccDrop.classList.remove('open');
  ccBack.classList.remove('open');
}

ccSearch.addEventListener('input', () => renderCCList(ccSearch.value));
document.getElementById('ccTrigger').addEventListener('click', openCCDropdown);
document.getElementById('ccCloseBtn').addEventListener('click', closeCCDropdown);
ccBack.addEventListener('click', closeCCDropdown);

// Set default by timezone
(function setDefault() {
  try {
    const tz = Intl.DateTimeFormat().resolvedOptions().timeZone;
    const code = TZ_MAP[tz] || '+91';
    const entry = CC.find(([,n,c]) => c === code);
    if (entry) { setCCValue(entry[0], entry[1], entry[2]); return; }
  } catch(e) {}
  setCCValue('IN', 'India', '+91');
})();

// ── Settings panel ──
function toggleSettings() {
  const panel    = document.getElementById('settingsPanel');
  const backdrop = document.getElementById('settingsBackdrop');
  const gear     = document.getElementById('gearBtn');
  const isOpen   = panel.classList.contains('show');
  panel.classList.toggle('show', !isOpen);
  backdrop.classList.toggle('show', !isOpen);
  gear.classList.toggle('open', !isOpen);
}
function closeSettings() {
  document.getElementById('settingsPanel').classList.remove('show');
  document.getElementById('settingsBackdrop').classList.remove('show');
  document.getElementById('gearBtn').classList.remove('open');
}

// ── Size picker ──
function setSize(s) {
  document.documentElement.setAttribute('data-size', s);
  document.querySelectorAll('.sz-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.sz === s);
  });
  localStorage.setItem('qm_size', s);
}
const savedSize = localStorage.getItem('qm_size') || 'M';
setSize(savedSize);

// ── Theme ──
const html      = document.documentElement;
const themeBtn  = document.getElementById('themeBtn');
const themeMeta = document.getElementById('themeColorMeta');

function applyTheme(t) {
  html.setAttribute('data-theme', t);
  themeMeta.content = t === 'dark' ? '#0d0d10' : '#f2f2f7';
  localStorage.setItem('qm_theme', t);
}
const savedTheme = localStorage.getItem('qm_theme');
if (savedTheme) {
  applyTheme(savedTheme);
} else {
  applyTheme(window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
}
themeBtn.onclick = () => applyTheme(html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');

// ── Platform ──
let platform = 'wa';
function setPlatform(p) {
  platform = p;
  const wa = p === 'wa';
  document.getElementById('btnWA').className = 'pt-btn' + (wa ? ' aw' : '');
  document.getElementById('btnTG').className = 'pt-btn' + (!wa ? ' at' : '');
  document.getElementById('sendBtn').className = 'cta ' + (wa ? 'wa-cta' : 'tg-cta');
  document.getElementById('ctaIcon').innerHTML = `<path d="${wa ? WA_PATH : TG_PATH}"/>`;
  document.getElementById('ctaLabel').textContent = wa ? 'Open in WhatsApp' : 'Open in Telegram';
  document.documentElement.style.setProperty('--accent', wa ? '#25D366' : '#2AABEE');
}

// ── Char count ──
const msgEl = document.getElementById('msgInput');
msgEl.addEventListener('input', () => {
  document.getElementById('charCount').textContent = msgEl.value.length;
});

// ── Per-country phone length rules [min, max] ──
const PHONE_LEN = {
  '+91':[10,10],'+1':[10,10],'+44':[10,10],'+61':[9,9],'+81':[10,11],
  '+86':[11,11],'+49':[10,12],'+33':[9,9],'+39':[9,11],'+34':[9,9],
  '+7':[10,10],'+55':[10,11],'+52':[10,10],'+971':[9,9],'+966':[9,9],
  '+92':[10,10],'+880':[10,10],'+62':[9,12],'+63':[10,10],'+65':[8,8],
  '+82':[9,10],'+84':[9,10],'+60':[9,10],'+66':[9,9],'+90':[10,10],
  '+20':[10,10],'+27':[9,9],'+234':[10,11],'+254':[9,9],'+256':[9,9],
  '+255':[9,9],'+251':[9,9],'+233':[9,9],'+212':[9,9],'+98':[10,10],
  '+964':[10,10],'+972':[9,9],'+962':[9,9],'+94':[9,9],'+886':[9,10],
  '+380':[9,9],'+48':[9,9],'+40':[9,9],'+31':[9,9],'+32':[9,9],
  '+46':[9,9],'+47':[8,8],'+45':[8,8],'+358':[9,10],'+41':[9,9],
  '+43':[10,13],'+353':[9,9],'+30':[10,10],'+351':[9,9],'+54':[10,11],
  '+57':[10,10],'+64':[8,10],
};

function getPhoneError(digits, ccVal) {
  if (!digits) return 'Please enter a phone number';
  const [min, max] = PHONE_LEN[ccVal] || [5, 15];
  if (digits.length < min) return `Too short — needs ${min} digits for ${ccVal}`;
  if (digits.length > max) return `Too long — max ${max} digits for ${ccVal}`;
  return null;
}

function showPhoneErr(msg) {
  document.getElementById('phoneWrap').classList.add('err');
  const el = document.getElementById('phoneError');
  el.textContent = msg; el.classList.add('show');
}
function clearPhoneErr() {
  document.getElementById('phoneWrap').classList.remove('err');
  document.getElementById('phoneError').classList.remove('show');
}

// Live validation (digits only)
document.getElementById('phoneInput').addEventListener('input', function() {
  // Strip any non-digit characters
  const pos = this.selectionStart;
  const cleaned = this.value.replace(/\D/g, '');
  if (this.value !== cleaned) {
    this.value = cleaned;
    try { this.setSelectionRange(pos - 1, pos - 1); } catch(e) {}
  }
  const digits = cleaned;
  if (!digits) { clearPhoneErr(); return; }
  const err = getPhoneError(digits, ccSel.value);
  if (err) showPhoneErr(err); else clearPhoneErr();
});
/* cc change handled in dropdown click */

// ── Open chat ──
function openChat() {
  const raw    = document.getElementById('phoneInput').value.trim();
  const digits = raw.replace(/\D/g, '');
  const err    = getPhoneError(digits, ccSel.value);
  if (err) { showPhoneErr(err); document.getElementById('phoneInput').focus(); return; }
  clearPhoneErr();
  const cc  = ccSel.value;
  const msg = msgEl.value.trim();
  const full = cc.replace(/\D/g, '') + digits.replace(/^0+/, '');
  const url  = platform === 'wa'
    ? `https://wa.me/${full}` + (msg ? `?text=${encodeURIComponent(msg)}` : '')
    : `https://t.me/+${full}` + (msg ? `?text=${encodeURIComponent(msg)}` : '');
  saveHist({ platform, number: full, display: `${cc} ${raw}`, ts: Date.now() });
  renderHist();
  window.open(url, '_blank');
}
document.getElementById('phoneInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') openChat();
});

// ── History ──
function getHist() { try { return JSON.parse(localStorage.getItem('qm_h') || '[]'); } catch { return []; } }
function saveHist(e) {
  let h = getHist().filter(x => !(x.number === e.number && x.platform === e.platform));
  h.unshift(e); h = h.slice(0, 10);
  localStorage.setItem('qm_h', JSON.stringify(h));
}
function clearHistory() { localStorage.removeItem('qm_h'); renderHist(); }

function renderHist() {
  const h    = getHist();
  const sec  = document.getElementById('histSec');
  const list = document.getElementById('histList');
  if (!h.length) { sec.style.display = 'none'; return; }
  sec.style.display = 'flex';
  list.innerHTML = h.map(e => {
    const d = new Date(e.ts);
    const t = d.toLocaleDateString(undefined, { month: 'short', day: 'numeric' }) +
              ' · ' + d.toLocaleTimeString(undefined, { hour: '2-digit', minute: '2-digit' });
    const icon  = e.platform === 'wa' ? '💬' : '✈️';
    const label = e.platform === 'wa' ? 'WhatsApp' : 'Telegram';
    const ep = e.platform, en = e.number.replace(/'/g,"\\'"), ed = e.display.replace(/'/g,"\\'");
    return `<div class="hist-item" onclick="fillHist('${ep}','${en}','${ed}')">
      <div class="hbadge ${e.platform}">${icon}</div>
      <div class="hinfo">
        <div class="hnum">${e.display}</div>
        <div class="htime">${label} · ${t}</div>
      </div>
      <span class="harr">›</span>
    </div>`;
  }).join('');
}

function fillHist(p, full, display) {
  setPlatform(p);
  for (const o of ccSel.options) {
    const cd = o.value.replace(/\D/g, '');
    if (full.startsWith(cd)) {
      o.selected = true;
      document.getElementById('phoneInput').value = full.slice(cd.length);
      break;
    }
  }
  document.getElementById('phoneInput').focus();
}

// ── Toast ──
let _tt;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  clearTimeout(_tt); _tt = setTimeout(() => el.classList.remove('show'), 2800);
}

// ── Clear × button ──
(function() {
  const pi = document.getElementById('phoneInput');
  const pc = document.getElementById('phoneClear');
  if (!pi || !pc) return;
  // show/hide × as user types
  pi.addEventListener('input', function() {
    pc.classList.toggle('show', this.value.length > 0);
  });
  // prevent input blur on mousedown
  pc.addEventListener('mousedown', function(e) { e.preventDefault(); });
  // clear everything on click
  pc.addEventListener('click', function() {
    pi.value = ''; pc.classList.remove('show');
    clearPhoneErr();
    pi.focus();
  });
})();

// ── Message clear × ──
(function() {
  const mc = document.getElementById('msgClear');
  if (!mc) return;
  msgEl.addEventListener('input', function() {
    mc.classList.toggle('show', this.value.length > 0);
    document.getElementById('charCount').textContent = this.value.length;
  });
  mc.addEventListener('mousedown', function(e) { e.preventDefault(); });
  mc.addEventListener('click', function() {
    msgEl.value = '';
    document.getElementById('charCount').textContent = '0';
    mc.classList.remove('show');
    msgEl.focus();
  });
})();

// ── Reset (kept for potential future use, not shown in UI) ──
function resetForm() {
  document.getElementById('phoneInput').value = '';
  clearPhoneErr();
  msgEl.value = '';
  document.getElementById('charCount').textContent = '0';
  const defaultCode = (function() {
    try {
      const tz = Intl.DateTimeFormat().resolvedOptions().timeZone;
      return TZ_MAP[tz] || '+91';
    } catch(e) { return '+91'; }
  })();
  const entry = CC.find(([,n,c]) => c === defaultCode) || ['IN','India','+91'];
  setCCValue(entry[0], entry[1], entry[2]);
  if (platform !== 'wa') setPlatform('wa');
  document.getElementById('phoneInput').focus();
}

// ── PWA install ──
let deferredPrompt;
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault(); deferredPrompt = e;
  if (!localStorage.getItem('qm_nodl'))
    document.getElementById('installBanner').classList.add('show');
});
document.getElementById('installBtn').onclick = async () => {
  if (!deferredPrompt) return;
  deferredPrompt.prompt(); await deferredPrompt.userChoice;
  deferredPrompt = null;
  document.getElementById('installBanner').classList.remove('show');
};
document.getElementById('dismissInstall').onclick = () => {
  document.getElementById('installBanner').classList.remove('show');
  localStorage.setItem('qm_nodl', '1');
};

// ── iOS tip ──
const isIos    = /iphone|ipad|ipod/i.test(navigator.userAgent);
const isSafari = /^((?!chrome|android).)*safari/i.test(navigator.userAgent);
if (isIos && isSafari && !window.navigator.standalone && !localStorage.getItem('qm_noios'))
  document.getElementById('iosTip').classList.add('show');
document.getElementById('dismissIos').onclick = () => {
  document.getElementById('iosTip').classList.remove('show');
  localStorage.setItem('qm_noios', '1');
};

// ── Boot ──
renderHist();
</script>
