<script>
(function(){
  const iconHref = document.querySelector('link[rel=apple-touch-icon]')?.href || '';
  const manifest = JSON.stringify({
    name: 'QuickMsg', short_name: 'QuickMsg',
    description: 'Message without saving the number',
    start_url: './', display: 'standalone', orientation: 'portrait',
    background_color: '#0d0d10', theme_color: '#0d0d10',
    icons: [
      { src: iconHref, sizes: '180x180', type: 'image/png' },
      { src: iconHref, sizes: '512x512', type: 'image/png', purpose: 'any maskable' }
    ]
  });
  const mBlob = new Blob([manifest], { type: 'application/json' });
  const mLink = document.createElement('link');
  mLink.rel = 'manifest'; mLink.href = URL.createObjectURL(mBlob);
  document.head.appendChild(mLink);

  if ('serviceWorker' in navigator) {
    const swCode = `
      self.addEventListener('install', () => self.skipWaiting());
      self.addEventListener('activate', e => e.waitUntil(clients.claim()));
      self.addEventListener('fetch', e => e.respondWith(fetch(e.request).catch(() => caches.match(e.request))));
    `;
    const swBlob = new Blob([swCode], { type: 'application/javascript' });
    navigator.serviceWorker.register(URL.createObjectURL(swBlob), { scope: '/' }).catch(() => {});
  }
})();
</script>

<style>
/* ── Size scale ── */
[data-size="S"]  { font-size: 13px; }
[data-size="M"]  { font-size: 16px; }
[data-size="L"]  { font-size: 19px; }
[data-size="XL"] { font-size: 22px; }

/* ── Color tokens — index4 palette ── */
:root {
  --bg:       #0d0d10;
  --surface:  #141417;
  --surface2: #1e1e25;
  --surface3: #26262f;
  --border:   #4a4a60;
  --border2:  #383850;
  --scrim:    rgba(0,0,0,0.72);
  --text1:    #f4f4fa;
  --text2:    #c8c8e0;
  --text3:    #b0b0cc;
  --green:    #22c55e;
  --red:      #f87171;
  --blue:     #3B82F6;
  --wa:       #25D366;
  --wa-dk:    #128C4E;
  --tg:       #2AABEE;
  --tg-dk:    #0d7cbf;
  --accent:   #25D366;
  --mono:     'Inter', sans-serif;
  --r:        12px;
  --r-lg:     16px;
  --r-xl:     20px;
  --ease:     cubic-bezier(0.16,1,0.3,1);
  --spring:   cubic-bezier(0.34,1.56,0.64,1);
  --safe-b:   env(safe-area-inset-bottom, 0px);
  --safe-t:   env(safe-area-inset-top, 0px);
}
[data-theme="soft-dark"] {
  --bg:       #1a1a1f;
  --surface:  #222228;
  --surface2: #2a2a32;
  --surface3: #313139;
  --border:   #4c4c5c;
  --border2:  #3d3d4a;
  --text1:    #ececf1;
  --text2:    #b8b8c8;
  --text3:    #888898;
}
[data-theme="light"] {
  --bg:       #f2f2f7;
  --surface:  #ffffff;
  --surface2: #ffffff;
  --surface3: #f0f0f5;
  --border:   #c8c8d8;
  --border2:  #d8d8e4;
  --text1:    #1a1a25;
  --text2:    #606078;
  --text3:    #9898b0;
  --scrim:    rgba(0,0,0,0.45);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html { height: 100%; overflow-x: hidden; font-size: 16px; background: var(--bg); transition: font-size .2s; }
body {
  font-family: 'Inter', -apple-system, sans-serif;
  background: var(--bg); color: var(--text1);
  min-height: 100dvh; max-width: 100vw;
  -webkit-font-smoothing: antialiased;
  overflow-x: hidden;
  transition: background .25s, color .25s;
  padding:
    env(safe-area-inset-top, 0px)
    env(safe-area-inset-right, 0px)
    env(safe-area-inset-bottom, 0px)
    env(safe-area-inset-left, 0px);
}
::-webkit-scrollbar { width: 0; height: 0; }

/* ── Layout ── */
.app {
  width: 100%; max-width: 480px; margin: 0 auto;
  padding: 0 14px 3.5rem;
  display: flex; flex-direction: column; gap: 1.25rem;
  min-height: 100dvh;
}

/* ── Header (index4 sticky style) ── */
.top-header {
  position: sticky; top: 0; z-index: 80;
  background: rgba(13,13,16,0.96);
  backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border2);
  padding: calc(env(safe-area-inset-top, 12px) + 12px) 16px 11px;
  display: flex; align-items: center; justify-content: center;
  margin-left: -14px; margin-right: -14px; width: calc(100% + 28px);
}
[data-theme="light"] .top-header {
  background: var(--bg);
  border-bottom: 1px solid var(--border);
  box-shadow: none;
}
.hdr-inner {
  width: 100%; max-width: 480px;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 14px;
}
.hdr-left { display: flex; align-items: center; gap: 10px; }
.logo-icon {
  width: 2.2rem; height: 2.2rem; border-radius: 10px; flex-shrink: 0;
  background: linear-gradient(135deg, var(--wa), var(--tg));
  display: flex; align-items: center; justify-content: center;
  font-size: 1.1rem;
  box-shadow: 0 2px 10px rgba(37,211,102,.3);
}
.hdr-titles { display: flex; flex-direction: column; gap: 1px; }
.hdr-greeting { font-size: 0.68rem; color: var(--text3); font-weight: 400; letter-spacing: 0.1px; }
.hdr-name { font-size: 1rem; font-weight: 800; color: var(--text1); letter-spacing: -0.3px; line-height: 1.2; }
.hdr-right { display: flex; align-items: center; gap: 7px; }
.hdr-icon-btn {
  width: 2rem; height: 2rem; border-radius: 8px;
  background: var(--surface2); border: 1px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; color: var(--text2);
  transition: background .2s, color .2s, transform .3s;
}
.hdr-icon-btn:hover { color: var(--text1); }
.hdr-icon-btn.open { color: var(--accent); transform: rotate(45deg); }

/* ── Banners ── */
.banner {
  display: none; align-items: center; gap: 0.625rem;
  border-radius: var(--r); padding: 0.75rem 0.875rem;
  font-size: 0.8125rem;
}
.banner.show { display: flex; }
.banner p { flex: 1; color: var(--text2); line-height: 1.45; }
.banner-install { background: rgba(37,211,102,.06); border: 1px solid rgba(37,211,102,.18); }
.banner-ios     { background: rgba(42,171,238,.06); border: 1px solid rgba(42,171,238,.18); }
.ib-btn {
  background: var(--wa); color: #fff; border: none;
  border-radius: 7px; padding: 0.4375rem 0.8125rem;
  font-size: 0.8125rem; font-weight: 600; cursor: pointer;
  font-family: var(--mono); white-space: nowrap;
}
.ib-x {
  background: none; border: none; color: var(--text3);
  cursor: pointer; font-size: 1.375rem; line-height: 1; padding: 0 0.125rem;
  flex-shrink: 0;
}

/* ── Platform toggle ── */
.section-label {
  font-size: 0.65rem; font-weight: 600; letter-spacing: 0.5px;
  color: var(--text3); text-transform: uppercase; margin-bottom: 8px;
}
.platform-toggle {
  display: grid; grid-template-columns: 1fr 1fr;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--r-lg); padding: 4px; gap: 4px;
}
.pt-btn {
  display: flex; align-items: center; justify-content: center; gap: 8px;
  padding: 0.75rem; border-radius: calc(var(--r-lg) - 4px);
  border: none; background: transparent; color: var(--text3);
  font-size: 0.875rem; font-weight: 600; cursor: pointer;
  transition: all .22s var(--ease);
  font-family: var(--mono); user-select: none;
}
.pt-btn svg { width: 1.125rem; height: 1.125rem; flex-shrink: 0; }
.pt-btn.aw { background: rgba(37,211,102,.12); color: var(--wa); box-shadow: 0 0 0 1px rgba(37,211,102,.25); }
.pt-btn.at { background: rgba(42,171,238,.12); color: var(--tg); box-shadow: 0 0 0 1px rgba(42,171,238,.25); }
.pt-btn:active { transform: scale(.96); }

/* ── Card (index4 surface style) ── */
.card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--r-xl); padding: 1.25rem;
  display: flex; flex-direction: column; gap: 1rem;
  box-shadow: 0 2px 16px rgba(0,0,0,.35);
}

/* ── Field ── */
.field { display: flex; flex-direction: column; gap: 6px; }
.field label {
  font-size: 0.65rem; font-weight: 600; color: var(--text3);
  text-transform: uppercase; letter-spacing: 0.5px;
}
.field label .opt {
  font-weight: 400; opacity: 0.65; text-transform: none; letter-spacing: 0;
}

/* ── Phone row ── */
.phone-wrap {
  display: flex; align-items: stretch;
  border: 1.5px solid var(--border); border-radius: var(--r);
  overflow: hidden; background: var(--bg); transition: border-color .2s;
  height: 3rem;
}
.phone-wrap:focus-within { border-color: var(--accent); }
.phone-wrap.err { border-color: var(--red) !important; box-shadow: 0 0 0 2px rgba(248,113,113,.15); }
.phone-error { display: none; font-size: 0.72rem; color: var(--red); margin-top: 2px; padding-left: 2px; }
.phone-error.show { display: block; }

.cc-wrap {
  position: relative; flex-shrink: 0;
  width: 6.75rem; min-width: 6.75rem;
}
.cc-wrap select {
  appearance: none; -webkit-appearance: none;
  background: transparent; border: none;
  border-right: 1.5px solid var(--border);
  color: var(--text1); font-family: var(--mono);
  font-size: 0.9375rem; font-weight: 500;
  padding: 0 1.875rem 0 0.75rem;
  height: 3rem; width: 100%;
  cursor: pointer; outline: none;
  -webkit-transform: translateZ(0);
  transform: translateZ(0);
}
.cc-arr {
  position: absolute; right: 0.5rem; top: 50%; transform: translateY(-50%);
  pointer-events: none; color: var(--text3);
}
.phone-input {
  flex: 1; border: none; outline: none;
  background: transparent; color: var(--text1);
  font-family: var(--mono); font-size: 0.9375rem;
  padding: 0.8125rem 0.875rem;
}
.phone-input::placeholder { color: var(--text3); }

/* ── Message ── */
.msg-wrap {
  border: 1.5px solid var(--border); border-radius: var(--r);
  overflow: hidden; background: var(--bg); transition: border-color .2s;
}
.msg-wrap:focus-within { border-color: var(--accent); }
textarea {
  width: 100%; border: none; outline: none; resize: none;
  background: transparent; color: var(--text1);
  font-family: var(--mono); font-size: 0.9375rem; line-height: 1.5;
  padding: 0.8125rem 0.875rem; min-height: 6rem;
}
textarea::placeholder { color: var(--text3); }
.char-count {
  text-align: right; font-size: 0.6875rem; color: var(--text3);
  padding: 2px 0.75rem 0.5rem;
}

/* ── CTA ── */
.cta {
  width: 100%; padding: 0.9375rem; border: none; border-radius: var(--r);
  font-family: var(--mono); font-size: 1rem; font-weight: 700;
  cursor: pointer; color: #fff; letter-spacing: .01em;
  display: flex; align-items: center; justify-content: center; gap: 0.625rem;
  transition: transform .15s var(--spring), box-shadow .2s;
}
.cta:active { transform: scale(.97); }
.cta svg { width: 1.25rem; height: 1.25rem; }
.wa-cta {
  background: linear-gradient(135deg, var(--wa), var(--wa-dk));
  box-shadow: 0 4px 18px rgba(37,211,102,.35);
}
.tg-cta {
  background: linear-gradient(135deg, var(--tg), var(--tg-dk));
  box-shadow: 0 4px 18px rgba(42,171,238,.35);
}

/* ── Reset button ── */
.reset-btn {
  width: 100%; padding: 0.5rem;
  background: none; border: none; cursor: pointer;
  font-family: var(--mono); font-size: 0.8125rem; font-weight: 500;
  color: var(--text3);
  display: flex; align-items: center; justify-content: center; gap: 6px;
  opacity: 0.7; transition: opacity .2s;
}
.reset-btn:hover  { opacity: 1; }
.reset-btn:active { opacity: 0.5; }
.reset-btn svg { width: 0.875rem; height: 0.875rem; flex-shrink: 0; }

/* ── History ── */
.history-section { display: flex; flex-direction: column; gap: 0.625rem; }
.sec-head { display: flex; align-items: center; justify-content: space-between; }
.sec-head span {
  font-size: 0.65rem; font-weight: 600; text-transform: uppercase;
  letter-spacing: 0.5px; color: var(--text3);
}
.clr-btn {
  font-size: 0.68rem; color: var(--text3); background: none;
  border: none; cursor: pointer; padding: 2px 6px;
  border-radius: 5px; font-family: var(--mono); transition: color .2s;
}
.clr-btn:hover { color: var(--red); }
.hist-list {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--r-lg); overflow: hidden;
}
.hist-item {
  display: flex; align-items: center; gap: 12px;
  padding: 12px 14px; cursor: pointer;
  border-bottom: 1px solid var(--border2);
  transition: background 120ms;
}
.hist-item:last-child { border-bottom: none; }
.hist-item:active { background: var(--surface2); }
.hbadge {
  width: 34px; height: 34px; border-radius: 10px; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 0.9rem;
  background: var(--surface2); border: 1px solid var(--border);
}
.hbadge.wa { background: rgba(37,211,102,.1); }
.hbadge.tg { background: rgba(42,171,238,.1); }
.hinfo { flex: 1; min-width: 0; }
.hnum  { font-size: 0.875rem; font-weight: 600; color: var(--text1); }
.htime { font-size: 0.68rem; color: var(--text3); margin-top: 1px; }
.harr  { color: var(--text3); font-size: 1.1rem; flex-shrink: 0; }

/* ── Settings panel (index4 sheet style) ── */
.settings-backdrop {
  display: none; position: fixed; inset: 0; z-index: 100;
  background: var(--scrim);
  backdrop-filter: blur(2px); -webkit-backdrop-filter: blur(2px);
}
.settings-backdrop.show { display: block; }
.settings-panel {
  position: fixed; bottom: 0; left: 50%;
  transform: translateX(-50%) translateY(100%);
  width: 100%; max-width: 480px;
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: var(--r-xl) var(--r-xl) 0 0;
  padding: 0.75rem 1.5rem 2.5rem;
  z-index: 101;
  transition: transform .3s var(--ease);
  box-shadow: 0 -0.5rem 2rem rgba(0,0,0,.5);
}
.settings-panel.show { transform: translateX(-50%) translateY(0); }

.sp-handle {
  width: 2.5rem; height: 0.25rem; border-radius: 1rem;
  background: var(--border); margin: 0 auto 1rem;
}
.sp-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 0.5rem;
}
.sp-title { font-size: 1rem; font-weight: 800; color: var(--text1); letter-spacing: -0.3px; }
.sp-close-btn {
  width: 2rem; height: 2rem; border-radius: 50%;
  border: none; background: var(--surface2); color: var(--text3);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; flex-shrink: 0;
  transition: background .2s, color .2s;
}
.sp-close-btn:hover { background: var(--border); color: var(--text1); }
.sp-close-btn:active { transform: scale(.92); }

.sp-row {
  display: flex; align-items: center; justify-content: space-between;
  padding: 0.875rem 0;
  border-top: 1px solid var(--border2);
}
.sp-label { font-size: 0.875rem; color: var(--text1); font-weight: 600; }

/* Size picker */
.size-picker {
  display: flex; align-items: center;
  background: var(--surface2); border: 1.5px solid var(--border);
  border-radius: var(--r); overflow: hidden;
}
.sz-btn {
  border: none; background: transparent; color: var(--text3);
  font-family: var(--mono); font-weight: 700;
  cursor: pointer; padding: 0.375rem 0.625rem;
  font-size: 0.75rem; line-height: 1;
  transition: background .15s, color .15s;
}
.sz-btn:not(:last-child) { border-right: 1px solid var(--border); }
.sz-btn.active { background: var(--accent); color: #fff; }
.sz-btn:not(.active):hover { color: var(--text1); }

/* Theme toggle switch */
.theme-toggle {
  display: flex; align-items: center; gap: 0.5rem;
  background: none; border: none; cursor: pointer;
  padding: 0; font-family: var(--mono);
}
.theme-toggle-track {
  position: relative; width: 2.75rem; height: 1.5rem;
  background: var(--border2); border-radius: 999px;
  transition: background .25s; display: block; flex-shrink: 0;
}
[data-theme="dark"] .theme-toggle-track,
[data-theme="soft-dark"] .theme-toggle-track { background: var(--accent); }
.theme-toggle-thumb {
  position: absolute; top: 0.1875rem; left: 0.1875rem;
  width: 1.125rem; height: 1.125rem; border-radius: 50%;
  background: #fff; transition: transform .25s var(--ease);
  box-shadow: 0 1px 4px rgba(0,0,0,.3);
}
[data-theme="dark"] .theme-toggle-thumb,
[data-theme="soft-dark"] .theme-toggle-thumb { transform: translateX(1.25rem); }
.theme-toggle-label { font-size: 0.875rem; font-weight: 500; color: var(--text1); }

/* ── Toast ── */
.toast {
  position: fixed; bottom: 1.75rem; left: 50%;
  transform: translateX(-50%) translateY(0.875rem);
  background: var(--surface2); border: 1px solid var(--border);
  color: var(--text1); padding: 0.625rem 1.25rem;
  border-radius: 6.25rem; font-size: 0.8125rem; font-weight: 500;
  opacity: 0; transition: all .28s var(--ease);
  pointer-events: none; white-space: nowrap;
  box-shadow: 0 8px 28px rgba(0,0,0,.4); z-index: 999;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>

const WA_PATH = `M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413Z`;

// ── Country select ──
const ccSel = document.getElementById('countryCode');
CC.forEach(([iso, code]) => {
  const o = document.createElement('option');
  o.value = code; o.textContent = `${iso} ${code}`;
  ccSel.appendChild(o);
});
(function setDefault() {
  try {
    const tz = Intl.DateTimeFormat().resolvedOptions().timeZone;
    const code = TZ_MAP[tz] || '+91';
    const o = [...ccSel.options].find(x => x.value === code);
    if (o) { o.selected = true; return; }
  } catch(e) {}
  const f = [...ccSel.options].find(x => x.value === '+91');
  if (f) f.selected = true;
})();

// ── Settings panel ──
function toggleSettings() {
  const panel    = document.getElementById('settingsPanel');
  const backdrop = document.getElementById('settingsBackdrop');
  const gear     = document.getElementById('gearBtn');
  const isOpen   = panel.classList.contains('show');
  panel.classList.toggle('show', !isOpen);
  backdrop.classList.toggle('show', !isOpen);
  gear.classList.toggle('open', !isOpen);
}
function closeSettings() {
  document.getElementById('settingsPanel').classList.remove('show');
  document.getElementById('settingsBackdrop').classList.remove('show');
  document.getElementById('gearBtn').classList.remove('open');
}

// ── Size picker ──
function setSize(s) {
  document.documentElement.setAttribute('data-size', s);
  document.querySelectorAll('.sz-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.sz === s);
  });
  localStorage.setItem('qm_size', s);
}
const savedSize = localStorage.getItem('qm_size') || 'M';
setSize(savedSize);

// ── Theme ──
const html      = document.documentElement;
const themeBtn  = document.getElementById('themeBtn');
const themeMeta = document.getElementById('themeColorMeta');

function applyTheme(t) {
  html.setAttribute('data-theme', t);
  const lbl = document.getElementById('themeLbl');
  if (lbl) lbl.textContent = t === 'dark' ? 'Dark' : 'Light';
  themeMeta.content = t === 'dark' ? '#0d0d10' : '#f2f2f7';
  localStorage.setItem('qm_theme', t);
}
const savedTheme = localStorage.getItem('qm_theme');
if (savedTheme) {
  applyTheme(savedTheme);
} else {
  applyTheme(window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
}
themeBtn.onclick = () => applyTheme(html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');

// ── Platform ──
let platform = 'wa';
function setPlatform(p) {
  platform = p;
  const wa = p === 'wa';
  document.getElementById('btnWA').className = 'pt-btn' + (wa ? ' aw' : '');
  document.getElementById('btnTG').className = 'pt-btn' + (!wa ? ' at' : '');
  document.getElementById('sendBtn').className = 'cta ' + (wa ? 'wa-cta' : 'tg-cta');
  document.getElementById('ctaIcon').innerHTML = `<path d="${wa ? WA_PATH : TG_PATH}"/>`;
  document.getElementById('ctaLabel').textContent = wa ? 'Open in WhatsApp' : 'Open in Telegram';
  document.documentElement.style.setProperty('--accent', wa ? '#25D366' : '#2AABEE');
}

// ── Char count ──
const msgEl = document.getElementById('msgInput');
msgEl.addEventListener('input', () => {
  document.getElementById('charCount').textContent = msgEl.value.length;
});

// ── Per-country phone length rules [min, max] ──
const PHONE_LEN = {
  '+91':[10,10],'+1':[10,10],'+44':[10,10],'+61':[9,9],'+81':[10,11],
  '+86':[11,11],'+49':[10,12],'+33':[9,9],'+39':[9,11],'+34':[9,9],
  '+7':[10,10],'+55':[10,11],'+52':[10,10],'+971':[9,9],'+966':[9,9],
  '+92':[10,10],'+880':[10,10],'+62':[9,12],'+63':[10,10],'+65':[8,8],
  '+82':[9,10],'+84':[9,10],'+60':[9,10],'+66':[9,9],'+90':[10,10],
  '+20':[10,10],'+27':[9,9],'+234':[10,11],'+254':[9,9],'+256':[9,9],
  '+255':[9,9],'+251':[9,9],'+233':[9,9],'+212':[9,9],'+98':[10,10],
  '+964':[10,10],'+972':[9,9],'+962':[9,9],'+94':[9,9],'+886':[9,10],
  '+380':[9,9],'+48':[9,9],'+40':[9,9],'+31':[9,9],'+32':[9,9],
  '+46':[9,9],'+47':[8,8],'+45':[8,8],'+358':[9,10],'+41':[9,9],
  '+43':[10,13],'+353':[9,9],'+30':[10,10],'+351':[9,9],'+54':[10,11],
  '+57':[10,10],'+64':[8,10],
};

function getPhoneError(digits, ccVal) {
  if (!digits) return 'Please enter a phone number';
  const [min, max] = PHONE_LEN[ccVal] || [5, 15];
  if (digits.length < min) return `Too short — needs ${min} digits for ${ccVal}`;
  if (digits.length > max) return `Too long — max ${max} digits for ${ccVal}`;
  return null;
}

function showPhoneErr(msg) {
  document.getElementById('phoneWrap').classList.add('err');
  const el = document.getElementById('phoneError');
  el.textContent = msg; el.classList.add('show');
}
function clearPhoneErr() {
  document.getElementById('phoneWrap').classList.remove('err');
  document.getElementById('phoneError').classList.remove('show');
}

// Live validation
document.getElementById('phoneInput').addEventListener('input', function() {
  const digits = this.value.replace(/\D/g, '');
  if (!digits) { clearPhoneErr(); return; }
  const err = getPhoneError(digits, ccSel.value);
  if (err) showPhoneErr(err); else clearPhoneErr();
});
ccSel.addEventListener('change', function() {
  const digits = document.getElementById('phoneInput').value.replace(/\D/g, '');
  if (digits) {
    const err = getPhoneError(digits, this.value);
    if (err) showPhoneErr(err); else clearPhoneErr();
  }
});

// ── Open chat ──
function openChat() {
  const raw    = document.getElementById('phoneInput').value.trim();
  const digits = raw.replace(/\D/g, '');
  const err    = getPhoneError(digits, ccSel.value);
  if (err) { showPhoneErr(err); document.getElementById('phoneInput').focus(); return; }
  clearPhoneErr();
  const cc  = ccSel.value;
  const msg = msgEl.value.trim();
  const full = cc.replace(/\D/g, '') + digits.replace(/^0+/, '');
  const url  = platform === 'wa'
    ? `https://wa.me/${full}` + (msg ? `?text=${encodeURIComponent(msg)}` : '')
    : `https://t.me/+${full}`;
  saveHist({ platform, number: full, display: `${cc} ${raw}`, ts: Date.now() });
  renderHist();
  window.open(url, '_blank');
}
document.getElementById('phoneInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') openChat();
});

// ── History ──
function getHist() { try { return JSON.parse(localStorage.getItem('qm_h') || '[]'); } catch { return []; } }
function saveHist(e) {
  let h = getHist().filter(x => !(x.number === e.number && x.platform === e.platform));
  h.unshift(e); h = h.slice(0, 10);
  localStorage.setItem('qm_h', JSON.stringify(h));
}
function clearHistory() { localStorage.removeItem('qm_h'); renderHist(); }

function renderHist() {
  const h    = getHist();
  const sec  = document.getElementById('histSec');
  const list = document.getElementById('histList');
  if (!h.length) { sec.style.display = 'none'; return; }
  sec.style.display = 'flex';
  list.innerHTML = h.map(e => {
    const d = new Date(e.ts);
    const t = d.toLocaleDateString(undefined, { month: 'short', day: 'numeric' }) +
              ' · ' + d.toLocaleTimeString(undefined, { hour: '2-digit', minute: '2-digit' });
    const icon  = e.platform === 'wa' ? '💬' : '✈️';
    const label = e.platform === 'wa' ? 'WhatsApp' : 'Telegram';
    const ep = e.platform, en = e.number.replace(/'/g,"\\'"), ed = e.display.replace(/'/g,"\\'");
    return `<div class="hist-item" onclick="fillHist('${ep}','${en}','${ed}')">
      <div class="hbadge ${e.platform}">${icon}</div>
      <div class="hinfo">
        <div class="hnum">${e.display}</div>
        <div class="htime">${label} · ${t}</div>
      </div>
      <span class="harr">›</span>
    </div>`;
  }).join('');
}

function fillHist(p, full, display) {
  setPlatform(p);
  for (const o of ccSel.options) {
    const cd = o.value.replace(/\D/g, '');
    if (full.startsWith(cd)) {
      o.selected = true;
      document.getElementById('phoneInput').value = full.slice(cd.length);
      break;
    }
  }
  document.getElementById('phoneInput').focus();
}

// ── Toast ──
let _tt;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  clearTimeout(_tt); _tt = setTimeout(() => el.classList.remove('show'), 2800);
}

// ── Reset ──
function resetForm() {
  document.getElementById('phoneInput').value = '';
  clearPhoneErr();
  msgEl.value = '';
  document.getElementById('charCount').textContent = '0';
  const defaultCode = (function() {
    try {
      const tz = Intl.DateTimeFormat().resolvedOptions().timeZone;
      return TZ_MAP[tz] || '+91';
    } catch(e) { return '+91'; }
  })();
  const f = [...ccSel.options].find(x => x.value === defaultCode);
  if (f) f.selected = true;
  requestAnimationFrame(() => {
    ccSel.style.opacity = '0.99';
    requestAnimationFrame(() => { ccSel.style.opacity = ''; });
  });
  setPlatform('wa');
  document.getElementById('phoneInput').focus();
  toast('Form reset ✓');
}

// ── PWA install ──
let deferredPrompt;
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault(); deferredPrompt = e;
  if (!localStorage.getItem('qm_nodl'))
    document.getElementById('installBanner').classList.add('show');
});
document.getElementById('installBtn').onclick = async () => {
  if (!deferredPrompt) return;
  deferredPrompt.prompt(); await deferredPrompt.userChoice;
  deferredPrompt = null;
  document.getElementById('installBanner').classList.remove('show');
};
document.getElementById('dismissInstall').onclick = () => {
  document.getElementById('installBanner').classList.remove('show');
  localStorage.setItem('qm_nodl', '1');
};

// ── iOS tip ──
const isIos    = /iphone|ipad|ipod/i.test(navigator.userAgent);
const isSafari = /^((?!chrome|android).)*safari/i.test(navigator.userAgent);
if (isIos && isSafari && !window.navigator.standalone && !localStorage.getItem('qm_noios'))
  document.getElementById('iosTip').classList.add('show');
document.getElementById('dismissIos').onclick = () => {
  document.getElementById('iosTip').classList.remove('show');
  localStorage.setItem('qm_noios', '1');
};

// ── Boot ──
renderHist();
</script>
