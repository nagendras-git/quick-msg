<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" id="themeColorMeta" content="#0f1117" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="QuickMsg" />
  <meta name="description" content="Send WhatsApp or Telegram messages without saving the number." />
  <title>QuickMsg</title>

  <!-- Apple touch icon -->
  <link rel="apple-touch-icon" href="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAMAAAADACAYAAABS3GwHAAAABmJLR0QA/wD/AP+gvaeTAAADsklEQVR4nO3BMQEAAADCoPVP7WsIoAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAeAMBuAABHgAAAABJRU5ErkJggg==" />

  <style>
    /* ── Design tokens: dark (default) ── */
    :root, [data-theme="dark"] {
      --bg:        #0f1117;
      --surface:   #191c27;
      --surface2:  #1e2133;
      --border:    #2a2d3a;
      --muted:     #6b7280;
      --text:      #f0f2f5;
      --sub:       #9ca3af;
      --shadow:    rgba(0,0,0,0.4);
      --tc:        #0f1117;
    }

    [data-theme="light"] {
      --bg:        #f4f6fa;
      --surface:   #ffffff;
      --surface2:  #eef1f7;
      --border:    #dde1eb;
      --muted:     #9ca3af;
      --text:      #111827;
      --sub:       #6b7280;
      --shadow:    rgba(0,0,0,0.08);
      --tc:        #f4f6fa;
    }

    :root {
      --wa:      #25D366;
      --wa-dk:   #128C4E;
      --tg:      #2AABEE;
      --tg-dk:   #0d7cbf;
      --accent:  #25D366;
      --r:       16px;
      --rs:      10px;
      --font:    'Inter', system-ui, -apple-system, sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      transition: background .25s, color .25s;
      padding: env(safe-area-inset-top,0) env(safe-area-inset-right,0)
               env(safe-area-inset-bottom,0) env(safe-area-inset-left,0);
    }

    .app {
      width: 100%; max-width: 480px;
      padding: 24px 20px 52px;
      display: flex; flex-direction: column; gap: 22px;
      min-height: 100dvh;
    }

    /* ── Header ── */
    header {
      display: flex; align-items: center; gap: 12px; padding-top: 4px;
    }
    .logo {
      width: 44px; height: 44px; border-radius: 13px; flex-shrink: 0;
      background: linear-gradient(135deg, var(--wa), var(--tg));
      display: flex; align-items: center; justify-content: center; font-size: 22px;
      box-shadow: 0 4px 14px rgba(37,211,102,.3);
    }
    .brand { flex: 1; }
    .brand h1 { font-size: 20px; font-weight: 700; letter-spacing: -.5px; }
    .brand p  { font-size: 12px; color: var(--muted); margin-top: 2px; }

    /* Theme toggle */
    .theme-btn {
      width: 38px; height: 38px; border-radius: 10px;
      border: 1.5px solid var(--border);
      background: var(--surface); color: var(--text);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; font-size: 18px; flex-shrink: 0;
      transition: background .2s, border-color .2s;
    }
    .theme-btn:active { transform: scale(.93); }

    /* ── Banners ── */
    .banner {
      display: none; align-items: center; gap: 10px;
      border-radius: var(--rs); padding: 12px 14px; font-size: 13px;
    }
    .banner.show { display: flex; }
    .banner p { flex: 1; color: var(--sub); line-height: 1.45; }
    .banner-install {
      background: rgba(37,211,102,.09);
      border: 1px solid rgba(37,211,102,.25);
    }
    .banner-ios {
      background: rgba(42,171,238,.09);
      border: 1px solid rgba(42,171,238,.25);
    }
    .ib-btn {
      background: var(--wa); color: #fff; border: none;
      border-radius: 8px; padding: 7px 13px;
      font-size: 13px; font-weight: 600; cursor: pointer;
      font-family: var(--font); white-space: nowrap;
    }
    .ib-x {
      background: none; border: none; color: var(--muted);
      cursor: pointer; font-size: 22px; line-height: 1; padding: 0 2px;
      flex-shrink: 0;
    }

    /* ── Platform toggle ── */
    .toggle-label {
      font-size: 11px; font-weight: 600; text-transform: uppercase;
      letter-spacing: 1px; color: var(--muted); margin-bottom: 8px;
    }
    .platform-toggle {
      display: grid; grid-template-columns: 1fr 1fr;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r); padding: 4px; gap: 4px;
    }
    .pt-btn {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      padding: 12px; border-radius: calc(var(--r) - 4px);
      border: none; background: transparent; color: var(--muted);
      font-size: 14px; font-weight: 600; cursor: pointer;
      transition: all .22s cubic-bezier(.4,0,.2,1);
      font-family: var(--font); user-select: none;
    }
    .pt-btn svg { width: 20px; height: 20px; flex-shrink: 0; }
    .pt-btn.aw { background: rgba(37,211,102,.15); color: var(--wa);
                 box-shadow: 0 0 0 1px rgba(37,211,102,.3); }
    .pt-btn.at { background: rgba(42,171,238,.15); color: var(--tg);
                 box-shadow: 0 0 0 1px rgba(42,171,238,.3); }

    /* ── Card ── */
    .card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--r); padding: 20px;
      display: flex; flex-direction: column; gap: 16px;
      box-shadow: 0 2px 16px var(--shadow);
    }

    .field { display: flex; flex-direction: column; gap: 6px; }
    .field label {
      font-size: 11px; font-weight: 600; color: var(--sub);
      text-transform: uppercase; letter-spacing: .8px;
    }

    /* Phone row */
    .phone-wrap {
      display: flex; align-items: stretch;
      border: 1.5px solid var(--border); border-radius: var(--rs);
      overflow: hidden; background: var(--bg);
      transition: border-color .2s;
    }
    .phone-wrap:focus-within { border-color: var(--accent); }

    .cc-wrap { position: relative; flex-shrink: 0; }
    .cc-wrap select {
      appearance: none; -webkit-appearance: none;
      background: transparent; border: none;
      border-right: 1.5px solid var(--border);
      color: var(--text); font-family: var(--font);
      font-size: 14px; font-weight: 500;
      padding: 0 30px 0 12px; height: 100%;
      cursor: pointer; outline: none; min-width: 90px;
    }
    .cc-arr {
      position: absolute; right: 8px; top: 50%; transform: translateY(-50%);
      pointer-events: none; color: var(--muted);
    }

    .phone-input {
      flex: 1; border: none; outline: none;
      background: transparent; color: var(--text);
      font-family: var(--font); font-size: 16px; padding: 13px 14px;
    }
    .phone-input::placeholder { color: var(--muted); }

    /* Message */
    .msg-wrap {
      border: 1.5px solid var(--border); border-radius: var(--rs);
      overflow: hidden; background: var(--bg); transition: border-color .2s;
    }
    .msg-wrap:focus-within { border-color: var(--accent); }
    textarea {
      width: 100%; border: none; outline: none; resize: none;
      background: transparent; color: var(--text);
      font-family: var(--font); font-size: 15px; line-height: 1.5;
      padding: 13px 14px; min-height: 96px;
    }
    textarea::placeholder { color: var(--muted); }
    .char-count {
      text-align: right; font-size: 11px; color: var(--muted);
      padding: 2px 12px 8px;
    }

    /* CTA */
    .cta {
      width: 100%; padding: 15px; border: none; border-radius: var(--rs);
      font-family: var(--font); font-size: 16px; font-weight: 700;
      cursor: pointer; color: #fff; letter-spacing: .3px;
      display: flex; align-items: center; justify-content: center; gap: 10px;
      transition: transform .15s, box-shadow .2s;
    }
    .cta:active { transform: scale(.97); }
    .cta svg { width: 20px; height: 20px; }
    .wa-cta {
      background: linear-gradient(135deg, var(--wa), var(--wa-dk));
      box-shadow: 0 4px 18px rgba(37,211,102,.35);
    }
    .tg-cta {
      background: linear-gradient(135deg, var(--tg), var(--tg-dk));
      box-shadow: 0 4px 18px rgba(42,171,238,.35);
    }

    /* ── History ── */
    .history-section { display: flex; flex-direction: column; gap: 10px; }
    .sec-head { display: flex; align-items: center; justify-content: space-between; }
    .sec-head span {
      font-size: 11px; font-weight: 600; text-transform: uppercase;
      letter-spacing: 1px; color: var(--muted);
    }
    .clr-btn {
      font-size: 11px; color: var(--muted); background: none;
      border: none; cursor: pointer; padding: 2px 6px;
      border-radius: 4px; font-family: var(--font); transition: color .2s;
    }
    .clr-btn:hover { color: #ef4444; }
    .hist-item {
      display: flex; align-items: center; gap: 12px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--rs); padding: 10px 14px;
      cursor: pointer; transition: border-color .2s, background .2s;
    }
    .hist-item:hover { border-color: var(--accent); }
    .hbadge {
      width: 30px; height: 30px; border-radius: 8px;
      display: flex; align-items: center; justify-content: center; font-size: 14px;
      flex-shrink: 0;
    }
    .hbadge.wa { background: rgba(37,211,102,.15); }
    .hbadge.tg { background: rgba(42,171,238,.15); }
    .hinfo { flex: 1; min-width: 0; }
    .hnum  { font-size: 14px; font-weight: 600; }
    .htime { font-size: 11px; color: var(--muted); margin-top: 1px; }
    .harr  { color: var(--muted); font-size: 18px; flex-shrink: 0; }

    /* ── Toast ── */
    .toast {
      position: fixed; bottom: 28px; left: 50%;
      transform: translateX(-50%) translateY(14px);
      background: var(--surface2); border: 1px solid var(--border);
      color: var(--text); padding: 10px 20px;
      border-radius: 100px; font-size: 13px; font-weight: 500;
      opacity: 0; transition: all .28s cubic-bezier(.4,0,.2,1);
      pointer-events: none; white-space: nowrap;
      box-shadow: 0 8px 28px var(--shadow); z-index: 999;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>
<div class="app">

  <!-- Header -->
  <header>
    <div class="logo">💬</div>
    <div class="brand">
      <h1>QuickMsg</h1>
      <p>Message without saving</p>
    </div>
    <button class="theme-btn" id="themeBtn" title="Toggle light/dark mode">🌙</button>
  </header>

  <!-- Android install banner -->
  <div class="banner banner-install" id="installBanner">
    <p>📲 Add QuickMsg to your home screen</p>
    <button class="ib-btn" id="installBtn">Install</button>
    <button class="ib-x" id="dismissInstall">×</button>
  </div>

  <!-- iOS tip -->
  <div class="banner banner-ios" id="iosTip">
    <p>📲 <strong>Install on iPhone:</strong> Tap <strong>⎙ Share</strong> in Safari → <strong>"Add to Home Screen"</strong></p>
    <button class="ib-x" id="dismissIos">×</button>
  </div>

  <!-- Platform -->
  <div>
    <div class="toggle-label">Choose Platform</div>
    <div class="platform-toggle">
      <button class="pt-btn aw" id="btnWA" onclick="setPlatform('wa')">

        Telegram
      </button>
    </div>
  </div>

  <!-- Form -->
  <div class="card">
    <div class="field">
      <label for="phoneInput">Phone Number</label>
      <div class="phone-wrap">
        <div class="cc-wrap">
          <select id="countryCode" aria-label="Country code"></select>
          <svg class="cc-arr" width="14" height="14" viewBox="0 0 14 14" fill="none">
            <path d="M3 5.5L7 9.5L11 5.5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <input type="tel" id="phoneInput" class="phone-input"

    </div>

    <div class="field">
      <label for="msgInput">Message <span style="font-weight:400;opacity:.7">(optional)</span></label>
      <div class="msg-wrap">

      </svg>
      <span id="ctaLabel">Open in WhatsApp</span>
    </button>
  </div>

  <!-- Recent -->
  <div class="history-section" id="histSec" style="display:none">
    <div class="sec-head">
      <span>Recent</span>
      <button class="clr-btn" onclick="clearHistory()">Clear all</button>
    </div>
    <div id="histList"></div>
  </div>

</div>
<div class="toast" id="toast"></div>

// ── Country select ──
const ccSel = document.getElementById('countryCode');
CC.forEach(([iso, code]) => {
  const o = document.createElement('option');
  o.value = code; o.textContent = `${iso} ${code}`;
  ccSel.appendChild(o);
});
(function setDefaultCountry() {
  try {
    const tz = Intl.DateTimeFormat().resolvedOptions().timeZone;
    const code = TZ_MAP[tz] || '+91';
    const o = [...ccSel.options].find(x => x.value === code);
    if (o) { o.selected = true; return; }
  } catch(e) {}
  const fallback = [...ccSel.options].find(x => x.value === '+91');
  if (fallback) fallback.selected = true;
})();

// ── Theme ──
const html = document.documentElement;
const themeBtn = document.getElementById('themeBtn');
const themeMeta = document.getElementById('themeColorMeta');

function applyTheme(t) {
  html.setAttribute('data-theme', t);
  themeBtn.textContent = t === 'dark' ? '☀️' : '🌙';
  themeMeta.content = t === 'dark' ? '#0f1117' : '#f4f6fa';
  localStorage.setItem('qm_theme', t);
}

// Load saved or detect system preference
const savedTheme = localStorage.getItem('qm_theme');
if (savedTheme) {
  applyTheme(savedTheme);
} else {
  const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
  applyTheme(prefersDark ? 'dark' : 'light');
}

themeBtn.onclick = () => {
  applyTheme(html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
};

// ── Platform ──
let platform = 'wa';
function setPlatform(p) {
  platform = p;
  const wa = p === 'wa';
  document.getElementById('btnWA').className = 'pt-btn' + (wa ? ' aw' : '');
  document.getElementById('btnTG').className = 'pt-btn' + (!wa ? ' at' : '');
  document.getElementById('sendBtn').className = 'cta ' + (wa ? 'wa-cta' : 'tg-cta');
  document.getElementById('ctaIcon').innerHTML = `<path d="${wa ? WA_PATH : TG_PATH}"/>`;
  document.getElementById('ctaLabel').textContent = wa ? 'Open in WhatsApp' : 'Open in Telegram';
  document.documentElement.style.setProperty('--accent', wa ? '#25D366' : '#2AABEE');
}

// ── Char count ──
const msgEl = document.getElementById('msgInput');
msgEl.addEventListener('input', () => {
  document.getElementById('charCount').textContent = msgEl.value.length;
});

// ── Open chat ──
function openChat() {
  const raw = document.getElementById('phoneInput').value.trim();
  const cc  = ccSel.value;
  const msg = msgEl.value.trim();
  if (!raw) { toast('Please enter a phone number'); return; }
  const digits = raw.replace(/\D/g, '');
  if (!digits) { toast('Enter a valid phone number'); return; }
  const full = cc.replace(/\D/g, '') + digits.replace(/^0+/, '');
  const url  = platform === 'wa'
    ? `https://wa.me/${full}` + (msg ? `?text=${encodeURIComponent(msg)}` : '')
    : `https://t.me/+${full}`;
  saveHist({ platform, number: full, display: `${cc} ${raw}`, ts: Date.now() });
  renderHist();
  window.open(url, '_blank');
}

document.getElementById('phoneInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') openChat();
});

// ── History ──
function getHist() { try { return JSON.parse(localStorage.getItem('qm_h') || '[]'); } catch { return []; } }
function saveHist(e) {
  let h = getHist().filter(x => !(x.number === e.number && x.platform === e.platform));
  h.unshift(e); h = h.slice(0, 10);
  localStorage.setItem('qm_h', JSON.stringify(h));
}
function clearHistory() { localStorage.removeItem('qm_h'); renderHist(); }

function renderHist() {
  const h = getHist();
  const sec = document.getElementById('histSec');
  const list = document.getElementById('histList');
  if (!h.length) { sec.style.display = 'none'; return; }
  sec.style.display = 'flex';
  list.innerHTML = h.map(e => {
    const d = new Date(e.ts);
    const t = d.toLocaleDateString(undefined, { month: 'short', day: 'numeric' }) +
              ' · ' + d.toLocaleTimeString(undefined, { hour: '2-digit', minute: '2-digit' });
    const icon  = e.platform === 'wa' ? '💬' : '✈️';
    const label = e.platform === 'wa' ? 'WhatsApp' : 'Telegram';
    const ep = e.platform, en = e.number.replace(/'/g, "\\'"), ed = e.display.replace(/'/g, "\\'");
    return `<div class="hist-item" onclick="fillHist('${ep}','${en}','${ed}')">
      <div class="hbadge ${e.platform}">${icon}</div>
      <div class="hinfo">
        <div class="hnum">${e.display}</div>
        <div class="htime">${label} · ${t}</div>
      </div>
      <span class="harr">›</span>
    </div>`;
  }).join('');
}

function fillHist(p, full, display) {
  setPlatform(p);
  for (const o of ccSel.options) {
    const cd = o.value.replace(/\D/g, '');
    if (full.startsWith(cd)) {
      o.selected = true;
      document.getElementById('phoneInput').value = full.slice(cd.length);
      break;
    }
  }
  document.getElementById('phoneInput').focus();
}

// ── Toast ──
let _tt;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  clearTimeout(_tt); _tt = setTimeout(() => el.classList.remove('show'), 2800);
}

// ── PWA manifest injected as Blob (works on Android Chrome) ──
(function injectManifest() {
  const manifest = {
    name: 'QuickMsg',
    short_name: 'QuickMsg',
    description: 'Message without saving the number',
    start_url: location.href,
    scope: location.href,
    display: 'standalone',
    orientation: 'portrait',
    background_color: '#0f1117',
    theme_color: '#0f1117',
    icons: [
      {
        src: "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'%3E%3Crect width='512' height='512' rx='80' fill='%230f1117'/%3E%3ClinearGradient id='g' x1='0' y1='0' x2='1' y2='1'%3E%3Cstop offset='0' stop-color='%2325D366'/%3E%3Cstop offset='1' stop-color='%232AABEE'/%3E%3C/linearGradient%3E%3Crect x='100' y='100' width='312' height='312' rx='60' fill='url(%23g)'/%3E%3Ctext y='340' x='256' text-anchor='middle' font-size='200' font-family='system-ui'%3E%F0%9F%92%AC%3C/text%3E%3C/svg%3E",
        sizes: '512x512',
        type: 'image/svg+xml',
        purpose: 'any maskable'
      }
    ]
  };
  const blob = new Blob([JSON.stringify(manifest)], { type: 'application/manifest+json' });
  const url  = URL.createObjectURL(blob);
  const link = document.createElement('link');
  link.rel = 'manifest'; link.href = url;
  document.head.appendChild(link);
})();

// ── Service Worker via Blob ──
if ('serviceWorker' in navigator) {
  const sw = `
const CV='qm-v2';
self.addEventListener('install',e=>{self.skipWaiting();});
self.addEventListener('activate',e=>{
  e.waitUntil(caches.keys().then(ks=>Promise.all(ks.filter(k=>k!==CV).map(k=>caches.delete(k)))));
  self.clients.claim();
});
self.addEventListener('fetch',e=>{
  e.respondWith(fetch(e.request).catch(()=>caches.match(e.request)));
});`;
  const blob = new Blob([sw], { type: 'application/javascript' });
  navigator.serviceWorker.register(URL.createObjectURL(blob)).catch(() => {});
}

// ── Android install prompt ──
let deferredPrompt;
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
  if (!localStorage.getItem('qm_nodl')) {
    document.getElementById('installBanner').classList.add('show');
  }
});
document.getElementById('installBtn').onclick = async () => {
  if (!deferredPrompt) return;
  deferredPrompt.prompt();
  await deferredPrompt.userChoice;
  deferredPrompt = null;
  document.getElementById('installBanner').classList.remove('show');
};
document.getElementById('dismissInstall').onclick = () => {
  document.getElementById('installBanner').classList.remove('show');
  localStorage.setItem('qm_nodl', '1');
};

// ── iOS tip ──
const isIos = /iphone|ipad|ipod/i.test(navigator.userAgent);
const isSafari = /^((?!chrome|android).)*safari/i.test(navigator.userAgent);
const isStandalone = window.navigator.standalone === true;
if (isIos && isSafari && !isStandalone && !localStorage.getItem('qm_noios')) {
  document.getElementById('iosTip').classList.add('show');
}
document.getElementById('dismissIos').onclick = () => {
  document.getElementById('iosTip').classList.remove('show');
  localStorage.setItem('qm_noios', '1');
};

// ── Boot ──
renderHist();
</script>
