<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" id="themeColorMeta" content="#0a0a0f" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="QuickMsg" />
  <meta name="description" content="Send WhatsApp or Telegram messages without saving the number." />
  <title>QuickMsg</title>
  <!-- apple-touch-icon populated at runtime by canvas PNG generator -->
  <link rel="apple-touch-icon" id="appleTouchIcon" href="about:blank" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    /* ── Tokens: dark ── */
    :root, [data-theme="dark"] {
      --bg:        #0a0a0f;
      --surface:   #13131a;
      --surface2:  #1a1a24;
      --surface3:  #20202e;
      --border:    #2a2a3d;
      --border2:   #333348;
      --muted:     #5a5a78;
      --text:      #eeeef5;
      --sub:       #8888a8;
      --shadow:    rgba(0,0,0,.55);
      --tc:        #0a0a0f;
    }
    [data-theme="light"] {
      --bg:        #f0f2f8;
      --surface:   #ffffff;
      --surface2:  #f5f6fc;
      --surface3:  #eaecf5;
      --border:    #dde0ef;
      --border2:   #c8ccdf;
      --muted:     #a0a4be;
      --text:      #0f0f1a;
      --sub:       #6b6f8a;
      --shadow:    rgba(0,0,0,.07);
      --tc:        #f0f2f8;
    }
    :root {
      --wa:        #25D366;
      --wa-dk:     #128C4E;
      --wa-glow:   rgba(37,211,102,.28);
      --tg:        #2AABEE;
      --tg-dk:     #0d7cbf;
      --tg-glow:   rgba(42,171,238,.28);
      --accent:    #25D366;
      --r:         18px;
      --rs:        12px;
      --font:      'Inter', system-ui, -apple-system, sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      -webkit-font-smoothing: antialiased;
      transition: background .3s, color .3s;
      padding: env(safe-area-inset-top,0) env(safe-area-inset-right,0)
               env(safe-area-inset-bottom,0) env(safe-area-inset-left,0);
    }

    .app {
      width: 100%; max-width: 460px;
      padding: 20px 18px 56px;
      display: flex; flex-direction: column; gap: 18px;
      min-height: 100dvh;
    }

    /* ── Header ── */
    header {
      display: flex; align-items: center; gap: 13px; padding-top: 6px;
    }
    .logo {
      width: 46px; height: 46px; border-radius: 14px; flex-shrink: 0;
      background: linear-gradient(145deg, #1a2e1c, #1a2835);
      display: flex; align-items: center; justify-content: center; font-size: 22px;
      border: 1px solid var(--border2);
      box-shadow: 0 0 0 1px rgba(37,211,102,.15), 0 6px 20px rgba(0,0,0,.4);
      position: relative; overflow: hidden;
    }
    .logo::after {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(145deg, rgba(37,211,102,.12), rgba(42,171,238,.08));
    }
    .brand { flex: 1; }
    .brand h1 { font-size: 19px; font-weight: 700; letter-spacing: -.4px; }
    .brand p  { font-size: 12px; color: var(--muted); margin-top: 2px; }

    .header-actions { display: flex; gap: 8px; }

    .icon-btn {
      width: 38px; height: 38px; border-radius: 11px;
      border: 1px solid var(--border);
      background: var(--surface); color: var(--sub);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; font-size: 16px; flex-shrink: 0;
      transition: background .2s, border-color .2s, color .2s, transform .12s;
    }
    .icon-btn:active { transform: scale(.91); }
    .icon-btn:hover { border-color: var(--border2); color: var(--text); }

    /* ── Install banners ── */
    .banner {
      display: none; align-items: center; gap: 10px;
      border-radius: var(--rs); padding: 11px 13px; font-size: 13px;
      animation: slideDown .25s ease;
    }
    @keyframes slideDown { from { opacity:0; transform:translateY(-6px); } to { opacity:1; transform:translateY(0); } }
    .banner.show { display: flex; }
    .banner p { flex: 1; color: var(--sub); line-height: 1.45; }
    .banner-install { background: rgba(37,211,102,.07); border: 1px solid rgba(37,211,102,.2); }
    .banner-ios     { background: rgba(42,171,238,.07); border: 1px solid rgba(42,171,238,.2); }
    .ib-btn {
      background: var(--wa); color: #fff; border: none;
      border-radius: 8px; padding: 6px 12px;
      font-size: 12px; font-weight: 600; cursor: pointer;
      font-family: var(--font); white-space: nowrap;
    }
    .ib-x {
      background: none; border: none; color: var(--muted);
      cursor: pointer; font-size: 20px; line-height: 1; padding: 0 2px;
      flex-shrink: 0;
    }

    /* ── Platform toggle ── */
    .section-label {
      font-size: 10.5px; font-weight: 600; text-transform: uppercase;
      letter-spacing: 1.1px; color: var(--muted); margin-bottom: 9px;
    }
    .platform-toggle {
      display: grid; grid-template-columns: 1fr 1fr;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r); padding: 4px; gap: 4px;
      position: relative;
    }
    .pt-btn {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      padding: 11px 12px; border-radius: calc(var(--r) - 5px);
      border: none; background: transparent; color: var(--muted);
      font-size: 14px; font-weight: 600; cursor: pointer;
      transition: all .22s cubic-bezier(.4,0,.2,1);
      font-family: var(--font); user-select: none; position: relative; z-index: 1;
    }
    .pt-btn svg { width: 19px; height: 19px; flex-shrink: 0; }
    .pt-btn.aw {
      background: rgba(37,211,102,.13); color: var(--wa);
      box-shadow: 0 0 0 1px rgba(37,211,102,.25), inset 0 1px 0 rgba(255,255,255,.04);
    }
    .pt-btn.at {
      background: rgba(42,171,238,.13); color: var(--tg);
      box-shadow: 0 0 0 1px rgba(42,171,238,.25), inset 0 1px 0 rgba(255,255,255,.04);
    }

    /* ── Card ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r); padding: 18px;
      display: flex; flex-direction: column; gap: 14px;
      box-shadow: 0 2px 24px var(--shadow);
    }

    .field { display: flex; flex-direction: column; gap: 7px; }
    .field-header {
      display: flex; align-items: center; justify-content: space-between;
    }
    .field label {
      font-size: 10.5px; font-weight: 600; color: var(--sub);
      text-transform: uppercase; letter-spacing: .9px;
    }
    .paste-btn {
      display: flex; align-items: center; gap: 5px;
      font-size: 11px; font-weight: 600; color: var(--muted);
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 6px; padding: 3px 9px; cursor: pointer;
      font-family: var(--font); transition: all .18s;
    }
    .paste-btn:hover { color: var(--accent); border-color: var(--accent); background: rgba(37,211,102,.06); }
    .paste-btn:active { transform: scale(.95); }
    .paste-btn svg { width: 11px; height: 11px; }

    /* Phone row */
    .phone-wrap {
      display: flex; align-items: stretch;
      border: 1.5px solid var(--border); border-radius: var(--rs);
      overflow: hidden; background: var(--surface2);
      transition: border-color .2s, box-shadow .2s;
    }
    .phone-wrap:focus-within {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(37,211,102,.1);
    }
    .cc-wrap { position: relative; flex-shrink: 0; }
    .cc-wrap select {
      appearance: none; -webkit-appearance: none;
      background: transparent; border: none;
      border-right: 1.5px solid var(--border);
      color: var(--text); font-family: var(--font);
      font-size: 13.5px; font-weight: 500;
      padding: 0 28px 0 11px; height: 100%;
      cursor: pointer; outline: none; min-width: 86px;
    }
    .cc-arr {
      position: absolute; right: 7px; top: 50%; transform: translateY(-50%);
      pointer-events: none; color: var(--muted);
    }
    .phone-input {
      flex: 1; border: none; outline: none;
      background: transparent; color: var(--text);
      font-family: var(--font); font-size: 16px; padding: 13px 12px;
    }
    .phone-input::placeholder { color: var(--muted); }

    /* Validation hint */
    .field-hint {
      font-size: 11px; height: 0; overflow: hidden;
      transition: height .2s, opacity .2s;
      opacity: 0; color: #f87171;
    }
    .field-hint.show { height: 16px; opacity: 1; }

    /* Message */
    .msg-wrap {
      border: 1.5px solid var(--border); border-radius: var(--rs);
      overflow: hidden; background: var(--surface2);
      transition: border-color .2s, box-shadow .2s;
    }
    .msg-wrap:focus-within {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(37,211,102,.1);
    }
    textarea {
      width: 100%; border: none; outline: none; resize: none;
      background: transparent; color: var(--text);
      font-family: var(--font); font-size: 15px; line-height: 1.5;
      padding: 12px 13px; min-height: 88px;
    }
    textarea::placeholder { color: var(--muted); }
    .char-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 4px 12px 8px;
    }
    .char-count {
      font-size: 11px; color: var(--muted);
      transition: color .2s;
    }
    .char-count.warn { color: #f59e0b; }
    .char-count.danger { color: #f87171; }
    .clear-msg {
      font-size: 11px; font-weight: 500; color: var(--muted);
      background: none; border: none; cursor: pointer;
      font-family: var(--font); padding: 0;
      transition: color .15s; display: none;
    }
    .clear-msg.show { display: block; }
    .clear-msg:hover { color: #f87171; }

    /* Quick templates */
    .templates-wrap { display: flex; flex-direction: column; gap: 7px; }
    .templates-label {
      font-size: 10.5px; font-weight: 600; color: var(--muted);
      text-transform: uppercase; letter-spacing: .9px;
    }
    .templates {
      display: flex; flex-wrap: wrap; gap: 6px;
    }
    .tpl-btn {
      font-size: 12px; font-weight: 500; color: var(--sub);
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 20px; padding: 5px 11px; cursor: pointer;
      font-family: var(--font); transition: all .18s; white-space: nowrap;
    }
    .tpl-btn:hover { color: var(--text); border-color: var(--border2); background: var(--surface3); }
    .tpl-btn:active { transform: scale(.95); }

    /* CTA */
    .cta {
      width: 100%; padding: 15px; border: none; border-radius: var(--rs);
      font-family: var(--font); font-size: 15.5px; font-weight: 700;
      cursor: pointer; color: #fff; letter-spacing: .2px;
      display: flex; align-items: center; justify-content: center; gap: 10px;
      transition: transform .15s, box-shadow .2s, filter .2s;
      position: relative; overflow: hidden;
    }
    .cta::after {
      content: ''; position: absolute; inset: 0;
      background: rgba(255,255,255,0); transition: background .15s;
    }
    .cta:hover::after { background: rgba(255,255,255,.06); }
    .cta:active { transform: scale(.97); }
    .cta svg { width: 20px; height: 20px; }
    .wa-cta {
      background: linear-gradient(135deg, #2edb6e, var(--wa-dk));
      box-shadow: 0 4px 22px var(--wa-glow);
    }
    .tg-cta {
      background: linear-gradient(135deg, #3eb8f5, var(--tg-dk));
      box-shadow: 0 4px 22px var(--tg-glow);
    }

    /* Copy link button */
    .secondary-actions {
      display: flex; gap: 8px;
    }
    .sec-btn {
      flex: 1; padding: 11px; border-radius: var(--rs);
      border: 1px solid var(--border); background: var(--surface2);
      color: var(--sub); font-family: var(--font); font-size: 13px; font-weight: 600;
      cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 6px;
      transition: all .18s;
    }
    .sec-btn:hover { border-color: var(--border2); color: var(--text); background: var(--surface3); }
    .sec-btn:active { transform: scale(.97); }
    .sec-btn svg { width: 15px; height: 15px; }

    /* ── History ── */
    .history-section { display: flex; flex-direction: column; gap: 10px; }
    .sec-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1px; }
    .sec-head span {
      font-size: 10.5px; font-weight: 600; text-transform: uppercase;
      letter-spacing: 1.1px; color: var(--muted);
    }
    .clr-btn {
      font-size: 11px; color: var(--muted); background: none;
      border: none; cursor: pointer; padding: 2px 6px;
      border-radius: 4px; font-family: var(--font); transition: color .2s;
    }
    .clr-btn:hover { color: #f87171; }

    .hist-item {
      display: flex; align-items: center; gap: 12px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--rs); padding: 10px 13px;
      cursor: pointer; transition: border-color .2s, background .15s, transform .12s;
    }
    .hist-item:hover { border-color: var(--accent); background: var(--surface2); }
    .hist-item:active { transform: scale(.985); }
    .hbadge {
      width: 32px; height: 32px; border-radius: 9px;
      display: flex; align-items: center; justify-content: center; font-size: 15px;
      flex-shrink: 0;
    }
    .hbadge.wa { background: rgba(37,211,102,.13); }
    .hbadge.tg { background: rgba(42,171,238,.13); }
    .hinfo { flex: 1; min-width: 0; }
    .hnum  { font-size: 14px; font-weight: 600; }
    .htime { font-size: 11px; color: var(--muted); margin-top: 2px; }
    .harr  { color: var(--muted); font-size: 16px; flex-shrink: 0; opacity: .5; }

    /* ── Toast ── */
    .toast {
      position: fixed; bottom: 32px; left: 50%;
      transform: translateX(-50%) translateY(12px);
      background: var(--surface2); border: 1px solid var(--border2);
      color: var(--text); padding: 10px 18px;
      border-radius: 100px; font-size: 13px; font-weight: 500;
      opacity: 0; transition: all .26s cubic-bezier(.4,0,.2,1);
      pointer-events: none; white-space: nowrap;
      box-shadow: 0 10px 36px var(--shadow); z-index: 999;
      max-width: calc(100vw - 48px); text-align: center;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    .toast.success { border-color: rgba(37,211,102,.4); background: rgba(37,211,102,.1); }

    /* ── Divider ── */
    .divider {
      height: 1px; background: var(--border); margin: 2px 0;
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { transition: none !important; animation: none !important; }
    }
  </style>
</head>
<body>
<div class="app">

  <!-- Header -->
  <header>
    <div class="logo">💬</div>
    <div class="brand">
      <h1>QuickMsg</h1>
      <p>Message without saving</p>
    </div>
    <div class="header-actions">
      <button class="icon-btn" id="themeBtn" title="Toggle theme" aria-label="Toggle light/dark mode">🌙</button>
    </div>
  </header>

  <!-- Android install banner -->
  <div class="banner banner-install" id="installBanner">
    <p>📲 Add QuickMsg to your home screen</p>
    <button class="ib-btn" id="installBtn">Install</button>
    <button class="ib-x" id="dismissInstall" aria-label="Dismiss">×</button>
  </div>

  <!-- iOS tip -->
  <div class="banner banner-ios" id="iosTip">
    <p>📲 <strong>iPhone:</strong> Tap <strong>⎙ Share</strong> in Safari → <strong>"Add to Home Screen"</strong></p>
    <button class="ib-x" id="dismissIos" aria-label="Dismiss">×</button>
  </div>

  <!-- Platform -->
  <div>
    <div class="section-label">Platform</div>
    <div class="platform-toggle" role="group" aria-label="Choose messaging platform">
      <button class="pt-btn aw" id="btnWA" onclick="setPlatform('wa')" aria-pressed="true">
        <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
          <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413Z"/>
        </svg>
        WhatsApp
      </button>
      <button class="pt-btn" id="btnTG" onclick="setPlatform('tg')" aria-pressed="false">
        <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
          <path d="M11.944 0A12 12 0 0 0 0 12a12 12 0 0 0 12 12 12 12 0 0 0 12-12A12 12 0 0 0 12 0a12 12 0 0 0-.056 0zm4.962 7.224c.1-.002.321.023.465.14a.506.506 0 0 1 .171.325c.016.093.036.306.02.472-.18 1.898-.962 6.502-1.36 8.627-.168.9-.499 1.201-.82 1.23-.696.065-1.225-.46-1.9-.902-1.056-.693-1.653-1.124-2.678-1.8-1.185-.78-.417-1.21.258-1.91.177-.184 3.247-2.977 3.307-3.23.007-.032.014-.15-.056-.212s-.174-.041-.249-.024c-.106.024-1.793 1.14-5.061 3.345-.48.33-.913.49-1.302.48-.428-.008-1.252-.241-1.865-.44-.752-.245-1.349-.374-1.297-.789.027-.216.325-.437.893-.663 3.498-1.524 5.83-2.529 6.998-3.014 3.332-1.386 4.025-1.627 4.476-1.635z"/>
        </svg>
        Telegram
      </button>
    </div>
  </div>

  <!-- Form Card -->
  <div class="card">
    <!-- Phone -->
    <div class="field">
      <div class="field-header">
        <label for="phoneInput">Phone Number</label>
        <button class="paste-btn" id="pasteBtn" title="Paste from clipboard">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="9" y="2" width="6" height="4" rx="1"/><path d="M8 4H6a2 2 0 00-2 2v14a2 2 0 002 2h12a2 2 0 002-2V6a2 2 0 00-2-2h-2"/>
          </svg>
          Paste
        </button>
      </div>
      <div class="phone-wrap" id="phoneWrap">
        <div class="cc-wrap">
          <select id="countryCode" aria-label="Country code"></select>
          <svg class="cc-arr" width="13" height="13" viewBox="0 0 14 14" fill="none" aria-hidden="true">
            <path d="M3 5.5L7 9.5L11 5.5" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <input type="tel" id="phoneInput" class="phone-input"
               placeholder="Enter number…" inputmode="tel" autocomplete="off"
               aria-label="Phone number" />
      </div>
      <div class="field-hint" id="phoneHint">Please enter a valid phone number</div>
    </div>

    <div class="divider"></div>

    <!-- Message -->
    <div class="field">
      <label for="msgInput">Message <span style="font-weight:400;opacity:.6">(optional)</span></label>
      <div class="msg-wrap">
        <textarea id="msgInput" placeholder="Type a message to pre-fill…"
                  maxlength="1000" rows="3" aria-label="Pre-fill message"></textarea>
        <div class="char-row">
          <button class="clear-msg" id="clearMsg" onclick="clearMessage()">Clear</button>
          <div class="char-count" id="charCount">0 / 1000</div>
        </div>
      </div>
    </div>

    <!-- Quick templates -->
    <div class="templates-wrap">
      <div class="templates-label">Quick Messages</div>
      <div class="templates" id="templates">
        <button class="tpl-btn" onclick="setTemplate(this)">On my way 🚗</button>
        <button class="tpl-btn" onclick="setTemplate(this)">I'll call you back 📞</button>
        <button class="tpl-btn" onclick="setTemplate(this)">Running late ⏰</button>
        <button class="tpl-btn" onclick="setTemplate(this)">Share location? 📍</button>
        <button class="tpl-btn" onclick="setTemplate(this)">Thanks! 🙏</button>
      </div>
    </div>

    <div class="divider"></div>

    <!-- Primary CTA -->
    <button class="cta wa-cta" id="sendBtn" onclick="openChat()">
      <svg id="ctaIcon" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">

<script>
// ── Countries ──
const CC = [
  ['AF','+93'],['AL','+355'],['DZ','+213'],['AR','+54'],['AU','+61'],

const WA_PATH = `M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413Z`;

// ── Country select ──
const ccSel = document.getElementById('countryCode');
CC.forEach(([iso, code]) => {
  const o = document.createElement('option');
  o.value = code; o.textContent = `${iso} ${code}`;
  ccSel.appendChild(o);
});
(function setDefaultCountry() {
  try {
    const tz = Intl.DateTimeFormat().resolvedOptions().timeZone;
    const code = TZ_MAP[tz] || '+91';
    const o = [...ccSel.options].find(x => x.value === code);
    if (o) { o.selected = true; return; }
  } catch(e) {}
  const fallback = [...ccSel.options].find(x => x.value === '+91');
  if (fallback) fallback.selected = true;
})();

// ── Theme ──
const html = document.documentElement;
const themeBtn = document.getElementById('themeBtn');
const themeMeta = document.getElementById('themeColorMeta');
function applyTheme(t) {
  html.setAttribute('data-theme', t);
  themeBtn.textContent = t === 'dark' ? '☀️' : '🌙';
  themeBtn.setAttribute('aria-label', t === 'dark' ? 'Switch to light mode' : 'Switch to dark mode');
  themeMeta.content = t === 'dark' ? '#0a0a0f' : '#f0f2f8';
  localStorage.setItem('qm_theme', t);
}
const savedTheme = localStorage.getItem('qm_theme');
if (savedTheme) {
  applyTheme(savedTheme);
} else {
  applyTheme(window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
}
themeBtn.onclick = () => applyTheme(html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');

// ── Platform ──
let platform = 'wa';
function setPlatform(p) {
  platform = p;
  const wa = p === 'wa';
  const btnWA = document.getElementById('btnWA');
  const btnTG = document.getElementById('btnTG');
  btnWA.className = 'pt-btn' + (wa ? ' aw' : '');
  btnTG.className = 'pt-btn' + (!wa ? ' at' : '');
  btnWA.setAttribute('aria-pressed', String(wa));
  btnTG.setAttribute('aria-pressed', String(!wa));
  const sendBtn = document.getElementById('sendBtn');
  sendBtn.className = 'cta ' + (wa ? 'wa-cta' : 'tg-cta');
  document.getElementById('ctaIcon').innerHTML = `<path d="${wa ? WA_PATH : TG_PATH}"/>`;
  document.getElementById('ctaLabel').textContent = wa ? 'Open in WhatsApp' : 'Open in Telegram';
  document.documentElement.style.setProperty('--accent', wa ? '#25D366' : '#2AABEE');
}

// ── Char count ──
const msgEl = document.getElementById('msgInput');
msgEl.addEventListener('input', updateCharCount);
function updateCharCount() {
  const len = msgEl.value.length;
  const el = document.getElementById('charCount');
  el.textContent = `${len} / 1000`;
  el.className = 'char-count' + (len > 900 ? ' danger' : len > 750 ? ' warn' : '');
  document.getElementById('clearMsg').className = 'clear-msg' + (len > 0 ? ' show' : '');
}

// ── Templates ──
function setTemplate(btn) {
  const text = btn.textContent.trim();
  msgEl.value = text;
  updateCharCount();
  msgEl.focus();
}

// ── Clear message ──
function clearMessage() {
  msgEl.value = '';
  updateCharCount();
}

// ── Reset form ──
function resetForm() {
  document.getElementById('phoneInput').value = '';
  msgEl.value = '';
  updateCharCount();
  clearPhoneError();
  document.getElementById('phoneInput').focus();
}

// ── Validation ──
function showPhoneError(msg) {
  const wrap = document.getElementById('phoneWrap');
  const hint = document.getElementById('phoneHint');
  wrap.style.borderColor = '#f87171';
  hint.textContent = msg;
  hint.classList.add('show');
}
function clearPhoneError() {
  const wrap = document.getElementById('phoneWrap');
  const hint = document.getElementById('phoneHint');
  wrap.style.borderColor = '';
  hint.classList.remove('show');
}
document.getElementById('phoneInput').addEventListener('input', clearPhoneError);

// ── Paste from clipboard ──
document.getElementById('pasteBtn').addEventListener('click', async () => {
  try {
    const text = await navigator.clipboard.readText();
    const digits = text.replace(/\D/g, '');
    if (digits) {
      document.getElementById('phoneInput').value = digits;
      clearPhoneError();
      toast('Number pasted ✓', true);
    } else {
      toast('No number found in clipboard');
    }
  } catch {
    toast('Clipboard access denied — paste manually');
  }
});

// ── Build URL ──
function buildUrl() {
  const raw = document.getElementById('phoneInput').value.trim();
  if (!raw) return null;
  const digits = raw.replace(/\D/g, '');
  if (!digits || digits.length < 5) return null;
  const cc = ccSel.value;
  const full = cc.replace(/\D/g, '') + digits.replace(/^0+/, '');
  const msg = msgEl.value.trim();
  return platform === 'wa'
    ? `https://wa.me/${full}` + (msg ? `?text=${encodeURIComponent(msg)}` : '')
    : `https://t.me/+${full}`;
}

// ── Open chat ──
function openChat() {
  const raw = document.getElementById('phoneInput').value.trim();
  if (!raw) { showPhoneError('Please enter a phone number'); return; }
  const digits = raw.replace(/\D/g, '');
  if (!digits || digits.length < 5) { showPhoneError('Enter a valid phone number'); return; }
  clearPhoneError();
  const cc = ccSel.value;
  const full = cc.replace(/\D/g, '') + digits.replace(/^0+/, '');
  const msg = msgEl.value.trim();
  const url = platform === 'wa'
    ? `https://wa.me/${full}` + (msg ? `?text=${encodeURIComponent(msg)}` : '')
    : `https://t.me/+${full}`;
  saveHist({ platform, number: full, display: `${cc} ${raw}`, ts: Date.now() });
  renderHist();
  window.open(url, '_blank');
}

document.getElementById('phoneInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') openChat();
});

// ── Copy link ──
async function copyLink() {
  const raw = document.getElementById('phoneInput').value.trim();
  if (!raw) { showPhoneError('Please enter a phone number first'); return; }
  const digits = raw.replace(/\D/g, '');
  if (!digits || digits.length < 5) { showPhoneError('Enter a valid phone number'); return; }
  clearPhoneError();
  const url = buildUrl();
  if (!url) { toast('Please enter a number first'); return; }
  try {
    await navigator.clipboard.writeText(url);
    toast('Link copied! ✓', true);
  } catch {
    toast('Could not copy — try manually');
  }
}

// ── History ──
function getHist() { try { return JSON.parse(localStorage.getItem('qm_h') || '[]'); } catch { return []; } }
function saveHist(e) {
  let h = getHist().filter(x => !(x.number === e.number && x.platform === e.platform));
  h.unshift(e); h = h.slice(0, 10);
  localStorage.setItem('qm_h', JSON.stringify(h));
}
function clearHistory() { localStorage.removeItem('qm_h'); renderHist(); }

function renderHist() {
  const h = getHist();
  const sec = document.getElementById('histSec');
  const list = document.getElementById('histList');
  if (!h.length) { sec.style.display = 'none'; return; }
  sec.style.display = 'flex';
  list.innerHTML = h.map(e => {
    const d = new Date(e.ts);
    const t = d.toLocaleDateString(undefined, { month: 'short', day: 'numeric' }) +
              ' · ' + d.toLocaleTimeString(undefined, { hour: '2-digit', minute: '2-digit' });
    const icon  = e.platform === 'wa' ? '💬' : '✈️';
    const label = e.platform === 'wa' ? 'WhatsApp' : 'Telegram';
    const ep = e.platform,
          en = e.number.replace(/'/g, "\\'"),
          ed = e.display.replace(/'/g, "\\'");
    return `<div class="hist-item" onclick="fillHist('${ep}','${en}','${ed}')" role="button" tabindex="0" aria-label="Open chat with ${e.display} on ${label}">
      <div class="hbadge ${e.platform}">${icon}</div>
      <div class="hinfo">
        <div class="hnum">${e.display}</div>
        <div class="htime">${label} · ${t}</div>
      </div>
      <span class="harr" aria-hidden="true">›</span>
    </div>`;
  }).join('');
  // keyboard support for history items
  list.querySelectorAll('.hist-item').forEach(el => {
    el.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') el.click(); });
  });
}

function fillHist(p, full, display) {
  setPlatform(p);
  for (const o of ccSel.options) {
    const cd = o.value.replace(/\D/g, '');
    if (full.startsWith(cd)) {
      o.selected = true;
      document.getElementById('phoneInput').value = full.slice(cd.length);
      break;
    }
  }
  clearPhoneError();
  document.getElementById('phoneInput').focus();
}

// ── Toast ──
let _tt;
function toast(msg, success = false) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast show' + (success ? ' success' : '');
  clearTimeout(_tt);
  _tt = setTimeout(() => el.className = 'toast', 2600);
}

// ── PWA manifest ──
// ── Icon generator (canvas → PNG data URLs) ──
function drawIcon(size, maskable) {
  const c = document.createElement('canvas');
  c.width = c.height = size;
  const ctx = c.getContext('2d');
  const r = size;

  // Background: full bleed for maskable, rounded rect for regular
  if (maskable) {
    ctx.fillStyle = '#0a0a0f';
    ctx.fillRect(0, 0, r, r);
  } else {
    const rad = size * 0.2;
    ctx.beginPath();
    ctx.moveTo(rad, 0);
    ctx.lineTo(r - rad, 0);
    ctx.quadraticCurveTo(r, 0, r, rad);
    ctx.lineTo(r, r - rad);
    ctx.quadraticCurveTo(r, r, r - rad, r);
    ctx.lineTo(rad, r);
    ctx.quadraticCurveTo(0, r, 0, r - rad);
    ctx.lineTo(0, rad);
    ctx.quadraticCurveTo(0, 0, rad, 0);
    ctx.closePath();
    ctx.fillStyle = '#0a0a0f';
    ctx.fill();
    ctx.clip();
  }

  // Inner gradient square (safe zone: 20–80% for maskable)
  const pad  = maskable ? size * 0.18 : size * 0.14;
  const sq   = size - pad * 2;
  const sqR  = sq * 0.22;
  const grad = ctx.createLinearGradient(pad, pad, pad + sq, pad + sq);
  grad.addColorStop(0, '#1f3d22');
  grad.addColorStop(0.5, '#1a2f3d');
  grad.addColorStop(1, '#122233');
  ctx.save();
  ctx.beginPath();
  ctx.moveTo(pad + sqR, pad);
  ctx.lineTo(pad + sq - sqR, pad);
  ctx.quadraticCurveTo(pad + sq, pad, pad + sq, pad + sqR);
  ctx.lineTo(pad + sq, pad + sq - sqR);
  ctx.quadraticCurveTo(pad + sq, pad + sq, pad + sq - sqR, pad + sq);
  ctx.lineTo(pad + sqR, pad + sq);
  ctx.quadraticCurveTo(pad, pad + sq, pad, pad + sq - sqR);
  ctx.lineTo(pad, pad + sqR);
  ctx.quadraticCurveTo(pad, pad, pad + sqR, pad);
  ctx.closePath();
  ctx.fillStyle = grad;
  ctx.fill();

  // Subtle border glow on inner square
  ctx.strokeStyle = 'rgba(37,211,102,0.35)';
  ctx.lineWidth = size * 0.012;
  ctx.stroke();
  ctx.restore();

  // Emoji 💬
  const emojiSize = sq * 0.52;
  ctx.font = `${emojiSize}px serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('💬', size / 2, size / 2 + emojiSize * 0.04);

  return c.toDataURL('image/png');
}

(function injectManifest() {
  const png192  = drawIcon(192, false);
  const png512  = drawIcon(512, false);
  const png512m = drawIcon(512, true);   // maskable

  // Also patch the apple-touch-icon in <head> with a crisp canvas PNG
  const ati = document.querySelector('link[rel="apple-touch-icon"]');
  const png180 = drawIcon(180, false);
  if (ati) {
    ati.href = png180;
  } else {
    const l = document.createElement('link');
    l.rel = 'apple-touch-icon'; l.href = png180;
    document.head.appendChild(l);
  }

  const manifest = {
    name: 'QuickMsg',
    short_name: 'QuickMsg',
    description: 'Message without saving the number',
    start_url: location.href,
    scope: location.href,
    display: 'standalone',
    orientation: 'portrait',
    background_color: '#0a0a0f',
    theme_color: '#0a0a0f',
    icons: [
      { src: png192,  sizes: '192x192',  type: 'image/png', purpose: 'any' },
      { src: png512,  sizes: '512x512',  type: 'image/png', purpose: 'any' },
      { src: png512m, sizes: '512x512',  type: 'image/png', purpose: 'maskable' }
    ]
  };
  const blob = new Blob([JSON.stringify(manifest)], { type: 'application/manifest+json' });
  const link = document.createElement('link');
  link.rel = 'manifest'; link.href = URL.createObjectURL(blob);
  document.head.appendChild(link);
})();

// ── Service Worker ──
if ('serviceWorker' in navigator) {
  const sw = `const CV='qm-v4';
self.addEventListener('install',e=>{self.skipWaiting();});
self.addEventListener('activate',e=>{
  e.waitUntil(caches.keys().then(ks=>Promise.all(ks.filter(k=>k!==CV).map(k=>caches.delete(k)))));
  self.clients.claim();
});
self.addEventListener('fetch',e=>{
  e.respondWith(fetch(e.request).catch(()=>caches.match(e.request)));
});`;
  const blob = new Blob([sw], { type: 'application/javascript' });
  navigator.serviceWorker.register(URL.createObjectURL(blob)).catch(() => {});
}

// ── Android install prompt ──
let deferredPrompt;
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
  if (!localStorage.getItem('qm_nodl'))
    document.getElementById('installBanner').classList.add('show');
});
document.getElementById('installBtn').onclick = async () => {
  if (!deferredPrompt) return;
  deferredPrompt.prompt();
  await deferredPrompt.userChoice;
  deferredPrompt = null;
  document.getElementById('installBanner').classList.remove('show');
};
document.getElementById('dismissInstall').onclick = () => {
  document.getElementById('installBanner').classList.remove('show');
  localStorage.setItem('qm_nodl', '1');
};

// ── iOS tip ──
const isIos = /iphone|ipad|ipod/i.test(navigator.userAgent);
const isSafari = /^((?!chrome|android).)*safari/i.test(navigator.userAgent);
const isStandalone = window.navigator.standalone === true;
if (isIos && isSafari && !isStandalone && !localStorage.getItem('qm_noios')) {
  document.getElementById('iosTip').classList.add('show');
}
document.getElementById('dismissIos').onclick = () => {
  document.getElementById('iosTip').classList.remove('show');
  localStorage.setItem('qm_noios', '1');
};

// ── Auto-focus on load ──
window.addEventListener('load', () => {
  setTimeout(() => document.getElementById('phoneInput').focus(), 300);
});

// ── Boot ──
renderHist();
</script>
