  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>

  <style>
    /* ── Size scale: S=13px M=16px L=19px XL=22px base ── */
    [data-size="S"] { font-size: 13px; }
    [data-size="M"] { font-size: 16px; }
    [data-size="L"] { font-size: 19px; }
    [data-size="XL"]{ font-size: 22px; }

    /* ── Color tokens ── */
    :root, [data-theme="dark"] {
      --bg:      #0f1117;
      --surface: #191c27;
      --sur2:    #1e2133;
      --border:  #2a2d3a;
      --muted:   #6b7280;
      --text:    #f0f2f5;
      --sub:     #9ca3af;
      --shadow:  rgba(0,0,0,.4);
      --tc:      #0f1117;
    }
    [data-theme="light"] {
      --bg:      #f4f6fa;
      --surface: #ffffff;
      --sur2:    #eef1f7;
      --border:  #dde1eb;
      --muted:   #9ca3af;
      --text:    #111827;
      --sub:     #6b7280;
      --shadow:  rgba(0,0,0,.08);
      --tc:      #f4f6fa;
    }
    :root {
      --wa:     #25D366;
      --wa-dk:  #128C4E;
      --tg:     #2AABEE;
      --tg-dk:  #0d7cbf;
      --accent: #25D366;
      --font: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Inter', system-ui, sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { transition: font-size .2s; }

    body {
      font-family: var(--font);
      font-size: inherit;
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
      display: flex; flex-direction: column; align-items: center;
      transition: background .25s, color .25s;
      padding: env(safe-area-inset-top,0) env(safe-area-inset-right,0)
               env(safe-area-inset-bottom,0) env(safe-area-inset-left,0);
    }

    .app {
      width: 100%; max-width: 30rem;
      padding: 1.5rem 1.25rem 3.5rem;
      display: flex; flex-direction: column; gap: 1.4rem;
      min-height: 100dvh;
    }

    /* ── Header ── */
    header { display: flex; align-items: center; gap: 0.75rem; padding-top: 0.25rem; }

    .logo {
      width: 2.75rem; height: 2.75rem; border-radius: 0.8rem; flex-shrink: 0;
      background: linear-gradient(135deg, var(--wa), var(--tg));
      display: flex; align-items: center; justify-content: center;
      font-size: 1.375rem;
      box-shadow: 0 0.25rem 0.875rem rgba(37,211,102,.3);
    }
    .brand { flex: 1; min-width: 0; }
    .brand h1 { font-size: 1.25rem; font-weight: 700; letter-spacing: -.03em; }
    .brand p  { font-size: 0.75rem; color: var(--muted); margin-top: 0.125rem; }

    /* Header controls */
    .hcontrols { display: flex; align-items: center; gap: 0.5rem; flex-shrink: 0; }

    /* Gear button */
    .gear-btn {
      width: 2.375rem; height: 2.375rem; border-radius: 0.625rem;
      border: 1.5px solid var(--border);
      background: var(--surface); color: var(--sub);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; flex-shrink: 0;
      transition: color .2s, background .2s, transform .3s;
    }
    .gear-btn:hover { color: var(--text); }
    .gear-btn.open { color: var(--accent); transform: rotate(45deg); }

    /* Settings backdrop */
    .settings-backdrop {
      display: none;
      position: fixed; inset: 0; z-index: 100;
      background: rgba(0,0,0,.4);
      backdrop-filter: blur(2px);
      -webkit-backdrop-filter: blur(2px);
    }
    .settings-backdrop.show { display: block; }

    /* Settings panel — slides up from bottom */
    .settings-panel {
      position: fixed; bottom: 0; left: 50%;
      transform: translateX(-50%) translateY(100%);
      width: 100%; max-width: 30rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 1.25rem 1.25rem 0 0;
      padding: 0.75rem 1.5rem 2.5rem;
      z-index: 101;
      transition: transform .32s cubic-bezier(.4,0,.2,1);
      box-shadow: 0 -0.5rem 2rem var(--shadow);
    }
    .settings-panel.show { transform: translateX(-50%) translateY(0); }

    .sp-handle {
      width: 2.5rem; height: 0.25rem; border-radius: 1rem;
      background: var(--border); margin: 0 auto 1.25rem;
    }
    .sp-title {
      font-size: 1rem; font-weight: 700; margin-bottom: 1.25rem;
      color: var(--text);
    }
    .sp-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0.875rem 0;
      border-top: 1px solid var(--border);
    }
    .sp-label {
      font-size: 0.9375rem; color: var(--text); font-weight: 500;
    }

    /* Size picker */
    .size-picker {
      display: flex; align-items: center;
      background: var(--bg); border: 1.5px solid var(--border);
      border-radius: 0.625rem; overflow: hidden;
    }
    .sz-btn {
      border: none; background: transparent; color: var(--muted);
      font-family: var(--font); font-weight: 700;
      cursor: pointer; padding: 0.375rem 0.625rem;
      font-size: 0.75rem; line-height: 1;
      transition: background .15s, color .15s;
    }
    .sz-btn:not(:last-child) { border-right: 1px solid var(--border); }
    .sz-btn.active { background: var(--accent); color: #fff; }
    .sz-btn:not(.active):hover { color: var(--text); }

    /* Theme toggle */
    /* ── Dark mode toggle ── */
    .toggle-switch {
      position: relative; width: 3rem; height: 1.625rem;
      flex-shrink: 0; cursor: pointer;
    }
    .toggle-switch input {
      opacity: 0; width: 0; height: 0; position: absolute;
    }
    .toggle-track {
      position: absolute; inset: 0;
      background: var(--border);
      border-radius: 1rem;
      transition: background .25s;
    }
    .toggle-switch input:checked + .toggle-track {
      background: var(--accent);
    }
    .toggle-thumb {
      position: absolute;
      top: 0.1875rem; left: 0.1875rem;
      width: 1.25rem; height: 1.25rem;
      background: #fff;
      border-radius: 50%;
      transition: transform .25s cubic-bezier(.34,1.56,.64,1);
      box-shadow: 0 1px 4px rgba(0,0,0,.3);
      display: flex; align-items: center; justify-content: center;
      font-size: .65rem; line-height: 1;
    }
    .toggle-switch input:checked + .toggle-track + .toggle-thumb {
      transform: translateX(1.375rem);
    }
    .toggle-sublabel {
      font-size: .72rem; color: var(--muted); font-weight: 400;
      margin-top: 2px;
    }

    /* ── Banners ── */
    .banner {
      display: none; align-items: center; gap: 0.625rem;
      border-radius: 0.625rem; padding: 0.75rem 0.875rem;
      font-size: 0.8125rem;
    }
    .banner.show { display: flex; }
    .banner p { flex: 1; color: var(--sub); line-height: 1.45; }
    .banner-install { background: rgba(37,211,102,.09); border: 1px solid rgba(37,211,102,.25); }
    .banner-ios     { background: rgba(42,171,238,.09); border: 1px solid rgba(42,171,238,.25); }
    .ib-btn {
      background: var(--wa); color: #fff; border: none;
      border-radius: 0.5rem; padding: 0.4375rem 0.8125rem;
      font-size: 0.8125rem; font-weight: 600; cursor: pointer;
      font-family: var(--font); white-space: nowrap;
    }
    .ib-x {
      background: none; border: none; color: var(--muted);
      cursor: pointer; font-size: 1.375rem; line-height: 1; padding: 0 0.125rem;
      flex-shrink: 0;
    }

    /* ── Platform toggle ── */

    .platform-toggle {
      display: grid; grid-template-columns: 1fr 1fr;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 1rem; padding: 0.25rem; gap: 0.25rem;
    }
    .pt-btn {
      display: flex; align-items: center; justify-content: center; gap: 0.5rem;
      padding: 0.75rem; border-radius: calc(1rem - 0.25rem);
      border: none; background: transparent; color: var(--muted);
      font-size: 0.875rem; font-weight: 600; cursor: pointer;
      transition: all .22s cubic-bezier(.4,0,.2,1);
      font-family: var(--font); user-select: none;
    }
    .pt-btn svg { width: 1.25rem; height: 1.25rem; flex-shrink: 0; }
    .pt-btn.aw { background: rgba(37,211,102,.15); color: var(--wa);
                 box-shadow: 0 0 0 1px rgba(37,211,102,.3); }
    .pt-btn.at { background: rgba(42,171,238,.15); color: var(--tg);
                 box-shadow: 0 0 0 1px rgba(42,171,238,.3); }

    /* ── Card ── */
    .card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 1rem; padding: 1.25rem;
      display: flex; flex-direction: column; gap: 1rem;
      box-shadow: 0 0.125rem 1rem var(--shadow);
    }

    .field { display: flex; flex-direction: column; gap: 0.375rem; }
    .field label {
      font-size: 0.8125rem; font-weight: 600; color: var(--sub);
      letter-spacing: -0.01em; line-height: 1.2;
    }

    /* Phone */
    .phone-wrap {
      display: flex; align-items: stretch;
      border: 1.5px solid var(--border); border-radius: 0.625rem;
      overflow: hidden; background: var(--bg); transition: border-color .2s;
    }
    .phone-wrap:focus-within { border-color: var(--accent); }
    .phone-wrap.error { border-color: #ef4444 !important; }
    .phone-error {
      font-size: 0.72rem; color: #ef4444; margin-top: 0.3rem;
      padding-left: 0.125rem; display: none; align-items: center; gap: 0.25rem;
    }
    .phone-error.show { display: flex; }

    .cc-wrap { position: relative; flex-shrink: 0; }
    .cc-wrap select {
      appearance: none; -webkit-appearance: none;
      background: transparent; border: none;
      border-right: 1.5px solid var(--border);
      color: var(--text); font-family: var(--font);
      font-size: 1rem; font-weight: 500;
      padding: 0 1.875rem 0 0.75rem; height: 100%;
      cursor: pointer; outline: none; min-width: 6.75rem;
    }
    .cc-arr {
      position: absolute; right: 0.5rem; top: 50%; transform: translateY(-50%);
      pointer-events: none; color: var(--muted);
    }
    .phone-input {
      flex: 1; border: none; outline: none;
      background: transparent; color: var(--text);
      font-family: var(--font); font-size: 1rem; padding: 0.8125rem 0.875rem;
    }
    .phone-input::placeholder { color: var(--muted); }

    /* Message */
    .msg-wrap {
      border: 1.5px solid var(--border); border-radius: 0.625rem;
      overflow: hidden; background: var(--bg); transition: border-color .2s;
    }
    .msg-wrap:focus-within { border-color: var(--accent); }
    textarea {
      width: 100%; border: none; outline: none; resize: none;
      background: transparent; color: var(--text);
      font-family: var(--font); font-size: 1rem; line-height: 1.55;
      padding: 0.8125rem 0.875rem; height: 5rem; min-height: 5rem; max-height: 5rem;
    }
    textarea::placeholder { color: var(--muted); }
    .char-count {
      text-align: right; font-size: 0.6875rem; color: var(--muted);
      padding: 0.125rem 0.75rem 0.5rem;
    }

    /* ── Reset link ── */
    .reset-link {
      width: 100%; padding: 0.5rem;
      background: none; border: none; cursor: pointer;
      font-family: var(--font); font-size: 0.8125rem; font-weight: 500;
      color: var(--muted);
      display: flex; align-items: center; justify-content: center; gap: 0.375rem;
      transition: color .18s;
      letter-spacing: .01em;
    }
    .reset-link:hover { color: #ef4444; }
    .reset-link:active { transform: scale(.97); }
    .reset-link svg { width: 0.875rem; height: 0.875rem; flex-shrink: 0; }

    /* ── CTA ── */
    .cta {
      width: 100%; padding: 0.9375rem; border: none; border-radius: 0.625rem;
      font-family: var(--font); font-size: 1rem; font-weight: 700;
      cursor: pointer; color: #fff; letter-spacing: .01em;
      display: flex; align-items: center; justify-content: center; gap: 0.625rem;
      transition: transform .15s, box-shadow .2s;
    }
    .cta:active { transform: scale(.97); }
    .cta svg { width: 1.25rem; height: 1.25rem; }
    .wa-cta {
      background: linear-gradient(135deg, var(--wa), var(--wa-dk));
      box-shadow: 0 0.25rem 1.125rem rgba(37,211,102,.35);
    }
    .tg-cta {
      background: linear-gradient(135deg, var(--tg), var(--tg-dk));
      box-shadow: 0 0.25rem 1.125rem rgba(42,171,238,.35);
    }

    /* ── History ── */
    .history-section { display: flex; flex-direction: column; gap: 0.625rem; }
    .sec-head { display: flex; align-items: center; justify-content: space-between; }
    .sec-head span {
      font-size: 0.6875rem; font-weight: 600; text-transform: uppercase;
      letter-spacing: 0.06em; color: var(--muted);
    }
    .clr-btn {
      font-size: 0.6875rem; color: var(--muted); background: none;
      border: none; cursor: pointer; padding: 0.125rem 0.375rem;
      border-radius: 0.25rem; font-family: var(--font); transition: color .2s;
    }
    .clr-btn:hover { color: #ef4444; }
    .hist-item {
      display: flex; align-items: center; gap: 0.75rem;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 0.625rem; padding: 0.625rem 0.875rem;
      cursor: pointer; transition: border-color .2s;
    }
    .hist-item:hover { border-color: var(--accent); }
    .hbadge {
      width: 1.875rem; height: 1.875rem; border-radius: 0.5rem;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.875rem; flex-shrink: 0;
    }
    .hbadge.wa { background: rgba(37,211,102,.15); }
    .hbadge.tg { background: rgba(42,171,238,.15); }
    .hinfo { flex: 1; min-width: 0; }
    .hnum  { font-size: 0.875rem; font-weight: 600; }
    .htime { font-size: 0.6875rem; color: var(--muted); margin-top: 0.0625rem; }
    .harr  { color: var(--muted); font-size: 1.125rem; flex-shrink: 0; }

    /* ── Toast ── */
    .toast {
      position: fixed; bottom: 1.75rem; left: 50%;
      transform: translateX(-50%) translateY(0.875rem);
      background: var(--sur2); border: 1px solid var(--border);
      color: var(--text); padding: 0.625rem 1.25rem;
      border-radius: 6.25rem; font-size: 0.8125rem; font-weight: 500;
      opacity: 0; transition: all .28s cubic-bezier(.4,0,.2,1);
      pointer-events: none; white-space: nowrap;
      box-shadow: 0 0.5rem 1.75rem var(--shadow); z-index: 999;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>
<div class="app">

  <header>
    <div class="logo">💬</div>
    <div class="brand">
      <h1>QuickMsg</h1>
      <p>Message without saving number</p>
    </div>
    <div class="hcontrols">
      <button class="gear-btn" id="gearBtn" onclick="toggleSettings()" title="Settings">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">

// ── Phone length rules: [min, max] digits (excluding country code) ──

const PHONE_LEN = {

// ── Phone validation ──
function getPhoneRules(ccVal) {
  return PHONE_LEN[ccVal] || [5, 15]; // fallback: 5–15 for unknown countries
}

function validatePhone(digits, ccVal) {
  if (!digits) return { ok: false, msg: 'Please enter a phone number' };
  const [min, max] = getPhoneRules(ccVal);
  if (digits.length < min) return { ok: false, msg: `Too short — needs ${min} digits for this country` };
  if (digits.length > max) return { ok: false, msg: `Too long — max ${max} digits for this country` };
  return { ok: true };
}

function showPhoneError(msg) {
  document.getElementById('phoneWrap').classList.add('error');
  document.getElementById('phoneErrorMsg').textContent = msg;
  document.getElementById('phoneError').classList.add('show');
}
function clearPhoneError() {
  document.getElementById('phoneWrap').classList.remove('error');
  document.getElementById('phoneError').classList.remove('show');
}

  'Asia/Dubai':'+971','Asia/Singapore':'+65','Asia/Tokyo':'+81',
  'Australia/Sydney':'+61','Asia/Karachi':'+92','Asia/Dhaka':'+880',
  'America/Sao_Paulo':'+55','Asia/Riyadh':'+966',
  'Asia/Colombo':'+94','Asia/Manila':'+63','Africa/Lagos':'+234',
};

const WA_PATH = `M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413Z`;
const TG_PATH = `M11.944 0A12 12 0 0 0 0 12a12 12 0 0 0 12 12 12 12 0 0 0 12-12A12 12 0 0 0 12 0a12 12 0 0 0-.056 0zm4.962 7.224c.1-.002.321.023.465.14a.506.506 0 0 1 .171.325c.016.093.036.306.02.472-.18 1.898-.962 6.502-1.36 8.627-.168.9-.499 1.201-.82 1.23-.696.065-1.225-.46-1.9-.902-1.056-.693-1.653-1.124-2.678-1.8-1.185-.78-.417-1.21.258-1.91.177-.184 3.247-2.977 3.307-3.23.007-.032.014-.15-.056-.212s-.174-.041-.249-.024c-.106.024-1.793 1.14-5.061 3.345-.48.33-.913.49-1.302.48-.428-.008-1.252-.241-1.865-.44-.752-.245-1.349-.374-1.297-.789.027-.216.325-.437.893-.663 3.498-1.524 5.83-2.529 6.998-3.014 3.332-1.386 4.025-1.627 4.476-1.635z`;

// ── Country select ──
const ccSel = document.getElementById('countryCode');
CC.forEach(([iso, code]) => {
  const o = document.createElement('option');
  o.value = code; o.textContent = `${iso} ${code}`;
  ccSel.appendChild(o);
});
(function setDefault() {
  try {
    const tz = Intl.DateTimeFormat().resolvedOptions().timeZone;
    const code = TZ_MAP[tz] || '+91';
    const o = [...ccSel.options].find(x => x.value === code);
    if (o) { o.selected = true; return; }
  } catch(e) {}
  const f = [...ccSel.options].find(x => x.value === '+91');
  if (f) f.selected = true;
})();

// ── Settings panel ──
function toggleSettings() {
  const panel    = document.getElementById('settingsPanel');
  const backdrop = document.getElementById('settingsBackdrop');
  const gear     = document.getElementById('gearBtn');
  const isOpen   = panel.classList.contains('show');
  panel.classList.toggle('show', !isOpen);
  backdrop.classList.toggle('show', !isOpen);
  gear.classList.toggle('open', !isOpen);
}
function closeSettings() {
  document.getElementById('settingsPanel').classList.remove('show');
  document.getElementById('settingsBackdrop').classList.remove('show');
  document.getElementById('gearBtn').classList.remove('open');
}

// ── Size picker ──
function setSize(s) {
  document.documentElement.setAttribute('data-size', s);
  document.querySelectorAll('.sz-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.sz === s);
  });
  localStorage.setItem('qm_size', s);
}
const savedSize = localStorage.getItem('qm_size') || 'M';
setSize(savedSize);

// ── Theme ──
const html      = document.documentElement;
const themeToggle = document.getElementById('themeToggle');
const themeSubLabel = document.getElementById('themeSubLabel');
const themeMeta = document.getElementById('themeColorMeta');

function applyTheme(t) {
  html.setAttribute('data-theme', t);
  const isDark = t === 'dark';
  themeToggle.checked = isDark;
  themeSubLabel.textContent = isDark ? 'Dark mode' : 'Light mode';
  themeMeta.content = isDark ? '#0f1117' : '#f4f6fa';
  localStorage.setItem('qm_theme', t);
}
const savedTheme = localStorage.getItem('qm_theme');
if (savedTheme) {
  applyTheme(savedTheme);
} else {
  applyTheme(window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
}
themeToggle.addEventListener('change', () => {
  applyTheme(themeToggle.checked ? 'dark' : 'light');
});

// ── Platform ──
let platform = 'wa';
function setPlatform(p) {
  platform = p;
  const wa = p === 'wa';
  document.getElementById('btnWA').className = 'pt-btn' + (wa ? ' aw' : '');
  document.getElementById('btnTG').className = 'pt-btn' + (!wa ? ' at' : '');
  document.getElementById('sendBtn').className = 'cta ' + (wa ? 'wa-cta' : 'tg-cta');
  document.getElementById('ctaIcon').innerHTML = `<path d="${wa ? WA_PATH : TG_PATH}"/>`;
  document.getElementById('ctaLabel').textContent = wa ? 'Open in WhatsApp' : 'Open in Telegram';
  document.documentElement.style.setProperty('--accent', wa ? '#25D366' : '#2AABEE');
}


// ── Char count ──
const msgEl = document.getElementById('msgInput');
msgEl.addEventListener('input', () => {
  document.getElementById('charCount').textContent = msgEl.value.length;
});

// ── Live phone validation ──
const phoneInput = document.getElementById('phoneInput');
phoneInput.addEventListener('input', () => {
  const digits = phoneInput.value.replace(/\D/g, '');
  if (!digits) { clearPhoneError(); return; }
  const result = validatePhone(digits, ccSel.value);
  if (!result.ok) showPhoneError(result.msg);
  else clearPhoneError();
});
ccSel.addEventListener('change', () => {
  const digits = phoneInput.value.replace(/\D/g, '');
  if (digits) {
    const result = validatePhone(digits, ccSel.value);
    if (!result.ok) showPhoneError(result.msg);
    else clearPhoneError();
  }
});

// ── Open chat ──
function openChat() {
  const raw    = phoneInput.value.trim();
  const digits = raw.replace(/\D/g, '');
  const result = validatePhone(digits, ccSel.value);
  if (!result.ok) { showPhoneError(result.msg); phoneInput.focus(); return; }
  clearPhoneError();
  const full = ccSel.value.replace(/\D/g, '') + digits.replace(/^0+/, '');
  const msg  = msgEl.value.trim();
  const url  = platform === 'wa'
    ? `https://wa.me/${full}` + (msg ? `?text=${encodeURIComponent(msg)}` : '')
    : `https://t.me/+${full}`;
  saveHist({ platform, number: full, display: `${ccSel.value} ${raw}`, ts: Date.now() });
  renderHist();
  window.open(url, '_blank');
}
phoneInput.addEventListener('keydown', e => { if (e.key === 'Enter') openChat(); });

// ── History ──
function getHist() { try { return JSON.parse(localStorage.getItem('qm_h') || '[]'); } catch { return []; } }
function saveHist(e) {
  let h = getHist().filter(x => !(x.number === e.number && x.platform === e.platform));
  h.unshift(e); h = h.slice(0, 10);
  localStorage.setItem('qm_h', JSON.stringify(h));
}
function clearHistory() { localStorage.removeItem('qm_h'); renderHist(); }

function renderHist() {
  const h = getHist();
  const sec  = document.getElementById('histSec');
  const list = document.getElementById('histList');
  if (!h.length) { sec.style.display = 'none'; return; }
  sec.style.display = 'flex';
  list.innerHTML = h.map(e => {
    const d = new Date(e.ts);
    const t = d.toLocaleDateString(undefined, { month: 'short', day: 'numeric' }) +
              ' · ' + d.toLocaleTimeString(undefined, { hour: '2-digit', minute: '2-digit' });
    const icon  = e.platform === 'wa' ? '💬' : '✈️';
    const label = e.platform === 'wa' ? 'WhatsApp' : 'Telegram';
    const ep = e.platform, en = e.number.replace(/'/g,"\\'"), ed = e.display.replace(/'/g,"\\'");
    return `<div class="hist-item" onclick="fillHist('${ep}','${en}','${ed}')">
      <div class="hbadge ${e.platform}">${icon}</div>
      <div class="hinfo">
        <div class="hnum">${e.display}</div>
        <div class="htime">${label} · ${t}</div>
      </div>
      <span class="harr">›</span>
    </div>`;
  }).join('');
}

function fillHist(p, full, display) {
  setPlatform(p);
  for (const o of ccSel.options) {
    const cd = o.value.replace(/\D/g, '');
    if (full.startsWith(cd)) {
      o.selected = true;
      document.getElementById('phoneInput').value = full.slice(cd.length);
      break;
    }
  }
  document.getElementById('phoneInput').focus();
}

// ── Toast ──
let _tt;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  clearTimeout(_tt); _tt = setTimeout(() => el.classList.remove('show'), 2800);
}

// ── Reset ──
function resetForm() {
  document.getElementById('phoneInput').value = '';
  clearPhoneError();
  msgEl.value = '';
  document.getElementById('charCount').textContent = '0';
  const f = [...ccSel.options].find(x => x.value === '+91');
  if (f) f.selected = true;
  setPlatform('wa');
  document.getElementById('phoneInput').focus();
  toast('Form reset ✓');
}

// ── Service Worker ──
if ('serviceWorker' in navigator) {
  const sw = `const CV='qm-v3';
self.addEventListener('install',e=>{self.skipWaiting();});
self.addEventListener('activate',e=>{e.waitUntil(caches.keys().then(ks=>Promise.all(ks.filter(k=>k!==CV).map(k=>caches.delete(k)))));self.clients.claim();});
self.addEventListener('fetch',e=>{e.respondWith(fetch(e.request).catch(()=>caches.match(e.request)));});`;
  navigator.serviceWorker.register(URL.createObjectURL(new Blob([sw],{type:'application/javascript'}))).catch(()=>{});
}

// ── Android install ──
let deferredPrompt;
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault(); deferredPrompt = e;
  if (!localStorage.getItem('qm_nodl'))
    document.getElementById('installBanner').classList.add('show');
});
document.getElementById('installBtn').onclick = async () => {
  if (!deferredPrompt) return;
  deferredPrompt.prompt(); await deferredPrompt.userChoice;
  deferredPrompt = null;
  document.getElementById('installBanner').classList.remove('show');
};
document.getElementById('dismissInstall').onclick = () => {
  document.getElementById('installBanner').classList.remove('show');
  localStorage.setItem('qm_nodl','1');
};

// ── iOS tip ──
const isIos = /iphone|ipad|ipod/i.test(navigator.userAgent);
const isSafari = /^((?!chrome|android).)*safari/i.test(navigator.userAgent);
if (isIos && isSafari && !window.navigator.standalone && !localStorage.getItem('qm_noios'))
  document.getElementById('iosTip').classList.add('show');
document.getElementById('dismissIos').onclick = () => {
  document.getElementById('iosTip').classList.remove('show');
  localStorage.setItem('qm_noios','1');
};

// ── Boot ──
renderHist();
